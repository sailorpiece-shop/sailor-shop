<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailor Piece Shop - Cloud Sync</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDK v10 Compat (Ổn định nhất cho Single HTML) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // CẤU HÌNH FIREBASE
        // ==========================================
       const firebaseConfig = {
  apiKey: "AIzaSyDLeEfK8gZjbXPrbu9RdlbRJWmioZa6Ui8",
  authDomain: "sailorpieceshop.firebaseapp.com",
  databaseURL: "https://sailorpieceshop-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sailorpieceshop",
  storageBucket: "sailorpieceshop.firebasestorage.app",
  messagingSenderId: "1084238596776",
  appId: "1:1084238596776:web:ada9fe247f440dca30109d",
  measurementId: "G-26S4B88DZR"
};

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [loggedUserData, setLoggedUserData] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [notification, setNotification] = useState(null);
            const [errorType, setErrorType] = useState(null);

            const [items, setItems] = useState([]);
            const [registeredUsers, setRegisteredUsers] = useState([]);
            const [pendingRequests, setPendingRequests] = useState([]);
            const [transactionHistory, setTransactionHistory] = useState([]);
            const [shopSettings, setShopSettings] = useState({
                bannerTitle: "CHINH PHỤC \n ĐẠI HẢI TRÌNH",
                bannerSubtitle: "Shop phân phối vật phẩm Sailor Piece uy tín.",
                checkoutMsg: "Cảm ơn bạn đã đặt hàng!",
                qrUrl: "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=SAILOR_SHOP",
                accountName: "ADMIN",
                accountNumber: "0000000000",
                bankName: "BANK"
            });

            const [cart, setCart] = useState([]);
            const [robloxUsername, setRobloxUsername] = useState('');
            const [authMode, setAuthMode] = useState('login');
            const [authForm, setAuthForm] = useState({ username: '', password: '', confirmPassword: '' });
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [showCheckoutSuccess, setShowCheckoutSuccess] = useState(false);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'sailor-shop-v1';
            const FANPAGE_URL = "https://www.facebook.com/share/17KdJjb5XM/";

            const showNotify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            // 1. Khởi tạo & Kết nối Firestore
            useEffect(() => {
                const startApp = async () => {
                    if (!firebaseConfig.apiKey) {
                        setErrorType('missing-config');
                        setIsLoading(false);
                        return;
                    }

                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(firebaseConfig);
                        }
                        
                        const db = firebase.firestore();
                        const auth = firebase.auth();

                        // Đăng nhập
                        try {
                            // SỬA LỖI: Khi dùng config riêng, ta bỏ qua token hệ thống để tránh lỗi mismatch
                            await auth.signInAnonymously();
                        } catch (authErr) {
                            console.error("Auth Error:", authErr);
                            if (authErr.code === 'auth/configuration-not-found') {
                                setErrorType('auth-not-enabled');
                            } else {
                                showNotify("Lỗi xác thực Firebase!");
                            }
                            setIsLoading(false);
                            return;
                        }

                        // Lắng nghe dữ liệu
                        const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data')
                            .onSnapshot((snap) => {
                                if (snap.exists) {
                                    const data = snap.data();
                                    setItems(data.items || []);
                                    setRegisteredUsers(data.users || []);
                                    setPendingRequests(data.requests || []);
                                    setTransactionHistory(data.history || []);
                                    if (data.settings) setShopSettings(prev => ({ ...prev, ...data.settings }));
                                } else {
                                    // Tạo dữ liệu mặc định nếu Firestore trống
                                    db.collection('artifacts').doc(appId).collection('public').doc('data').set({
                                        items: [
                                            { id: 1, name: "Trái Ác Quỷ: Mochi", category: "Item", price: 50000, stock: 10, img: "https://api.dicebear.com/7.x/shapes/svg?seed=mochi" },
                                            { id: 2, name: "Thanh Kiếm: Yoru", category: "Sword", price: 150000, stock: 5, img: "https://api.dicebear.com/7.x/shapes/svg?seed=yoru" }
                                        ],
                                        users: [],
                                        requests: [],
                                        history: [],
                                        settings: shopSettings
                                    });
                                }
                                setIsLoading(false);
                            }, (error) => {
                                console.error("Firestore Error:", error);
                                if (error.code === 'permission-denied') {
                                    showNotify("Lỗi phân quyền Firestore (Hãy chỉnh Rules sang true)!");
                                } else {
                                    showNotify("Lỗi đồng bộ dữ liệu!");
                                }
                                setIsLoading(false);
                            });

                        // Khôi phục session
                        const saved = localStorage.getItem('sp_session');
                        if (saved) setLoggedUserData(JSON.parse(saved));

                        return () => unsub();

                    } catch (error) {
                        console.error("Init Error:", error);
                        setIsLoading(false);
                    }
                };

                startApp();
            }, [appId]);

            const saveToCloud = async (updates) => {
                try {
                    const db = firebase.firestore();
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').update(updates);
                } catch (e) {
                    console.error("Save error", e);
                    showNotify("Lỗi: Không thể lưu dữ liệu!");
                }
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                if (authMode === 'register') {
                    if (authForm.password !== authForm.confirmPassword) return showNotify("Mật khẩu không khớp!");
                    if (registeredUsers.find(u => u.username === authForm.username)) return showNotify("Tên đã tồn tại!");
                    
                    const newUser = { username: authForm.username, password: authForm.password, balance: 0, role: 'user' };
                    await saveToCloud({ users: [...registeredUsers, newUser] });
                    showNotify("Đăng ký thành công!");
                    setAuthMode('login');
                } else {
                    if (authForm.username === 'Yewan' && authForm.password === 'Botditcogiao113!') {
                        const admin = { username: 'Yewan', role: 'admin', balance: 999999999 };
                        setLoggedUserData(admin);
                        localStorage.setItem('sp_session', JSON.stringify(admin));
                        setActiveTab('admin');
                        return;
                    }
                    const found = registeredUsers.find(u => u.username === authForm.username && u.password === authForm.password);
                    if (found) {
                        setLoggedUserData(found);
                        localStorage.setItem('sp_session', JSON.stringify(found));
                        setActiveTab('home');
                        showNotify("Chào mừng trở lại!");
                    } else showNotify("Sai tài khoản hoặc mật khẩu!");
                }
            };

            const handleAddToCart = (item) => {
                if (item.stock <= 0) return showNotify("Hết hàng!");
                const existing = cart.find(i => i.id === item.id);
                if (existing && existing.qty >= item.stock) return showNotify("Đạt giới hạn kho!");
                if (existing) setCart(cart.map(i => i.id === item.id ? { ...i, qty: i.qty + 1 } : i));
                else setCart([...cart, { ...item, qty: 1 }]);
                showNotify("Đã thêm giỏ hàng!");
            };

            const checkout = async () => {
                if (!robloxUsername) return showNotify("Nhập Roblox ID!");
                const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
                if (!loggedUserData || loggedUserData.balance < total) return showNotify("Không đủ tiền!");

                const order = {
                    id: Date.now(),
                    user: loggedUserData.username,
                    robloxUser: robloxUsername,
                    items: [...cart],
                    total,
                    status: 'pending',
                    date: new Date().toLocaleString(),
                    category: 'order'
                };

                const updatedUsers = registeredUsers.map(u => u.username === loggedUserData.username ? { ...u, balance: u.balance - total } : u);
                const updatedItems = items.map(it => {
                    const c = cart.find(x => x.id === it.id);
                    return c ? { ...it, stock: it.stock - c.qty } : it;
                });

                await saveToCloud({
                    users: updatedUsers,
                    items: updatedItems,
                    requests: [order, ...pendingRequests],
                    history: [order, ...transactionHistory]
                });

                if (loggedUserData.role !== 'admin') setLoggedUserData({ ...loggedUserData, balance: loggedUserData.balance - total });
                setCart([]);
                setIsCartOpen(false);
                setShowCheckoutSuccess(true);
            };

            const handleApprove = async (id) => {
                const req = pendingRequests.find(r => r.id === id);
                if (!req) return;
                let updatedUsers = [...registeredUsers];
                if (req.category === 'deposit') {
                    updatedUsers = registeredUsers.map(u => u.username === req.user ? { ...u, balance: u.balance + req.receivedValue } : u);
                    if (loggedUserData && loggedUserData.username === req.user) setLoggedUserData({ ...loggedUserData, balance: loggedUserData.balance + req.receivedValue });
                }
                await saveToCloud({
                    users: updatedUsers,
                    history: transactionHistory.map(h => h.id === id ? { ...h, status: req.category === 'deposit' ? 'approved' : 'completed' } : h),
                    requests: pendingRequests.filter(r => r.id !== id)
                });
                showNotify("Thao tác thành công!");
            };

            if (errorType === 'auth-not-enabled') return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-50 text-center">
                    <div className="max-w-md bg-white p-10 rounded-[2.5rem] shadow-xl border">
                        <i className="fa-solid fa-shield-halved text-5xl text-orange-500 mb-6"></i>
                        <h1 className="text-xl font-black uppercase mb-4">Chưa bật Xác thực Ẩn danh</h1>
                        <p className="text-slate-500 text-sm mb-6 leading-relaxed">
                            Bạn cần vào <b>Firebase Console</b> -> <b>Authentication</b> -> <b>Sign-in method</b> và bật (Enable) phương thức <b>Anonymous</b> thì ứng dụng mới có thể kết nối.
                        </p>
                        <button onClick={() => window.location.reload()} className="px-6 py-3 bg-blue-600 text-white font-black rounded-xl uppercase text-xs">Thử lại</button>
                    </div>
                </div>
            );

            if (isLoading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-[10px] font-black uppercase tracking-[0.3em]">Đang đồng bộ Đám Mây...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 pb-10 animate-fade-in">
                    {notification && (
                        <div className="fixed top-20 right-4 z-[120] bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border-l-4 border-blue-500 animate-in slide-in-from-right-full">
                            <i className="fa-solid fa-bolt text-yellow-400"></i>
                            <p className="text-sm font-bold">{notification}</p>
                        </div>
                    )}

                    {showCheckoutSuccess && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowCheckoutSuccess(false)}></div>
                            <div className="relative bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl animate-in zoom-in-95 border">
                                <div className="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-circle-check text-[40px]"></i></div>
                                <h3 className="text-2xl font-black text-center uppercase italic text-slate-800 mb-2">Thành Công!</h3>
                                <div className="bg-blue-50 p-5 rounded-3xl mb-8 text-sm font-bold text-slate-700 leading-relaxed text-center whitespace-pre-wrap">{shopSettings.checkoutMsg}</div>
                                <a href={FANPAGE_URL} target="_blank" className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs flex items-center justify-center gap-2 mb-3 shadow-lg shadow-blue-100"><i className="fa-brands fa-facebook-messenger text-lg"></i> Chat Với Admin Ngay</a>
                                <button onClick={() => setShowCheckoutSuccess(false)} className="w-full py-4 bg-slate-100 text-slate-500 font-black rounded-2xl uppercase text-xs">Đóng</button>
                            </div>
                        </div>
                    )}

                    <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b h-16 flex items-center px-4">
                        <div className="max-w-7xl mx-auto w-full flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveTab('home')}>
                                <div className="bg-blue-600 text-white p-2 rounded-xl flex items-center justify-center w-9 h-9 shadow-lg shadow-blue-100"><i className="fa-solid fa-anchor"></i></div>
                                <span className="text-lg font-black uppercase italic tracking-tighter">Sailor<span className="text-blue-600">Shop</span></span>
                            </div>
                            <nav className="hidden md:flex gap-6 text-[10px] font-black uppercase text-slate-400">
                                <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-blue-600' : ''}>Trang Chủ</button>
                                <button onClick={() => setActiveTab('shop')} className={activeTab === 'shop' ? 'text-blue-600' : ''}>Sản Phẩm</button>
                                <button onClick={() => setActiveTab('deposit')} className={activeTab === 'deposit' ? 'text-blue-600' : ''}>Nạp Tiền</button>
                                {loggedUserData && <button onClick={() => setActiveTab('history')}>Lịch Sử</button>}
                                {loggedUserData?.role === 'admin' && <button onClick={() => setActiveTab('admin')} className="text-orange-500 flex items-center gap-1"><i className="fa-solid fa-gear"></i> QUẢN TRỊ</button>}
                            </nav>
                            <div className="flex items-center gap-3">
                                {loggedUserData ? (
                                    <div className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-2xl border">
                                        <div className="text-right hidden sm:block">
                                            <p className="text-[8px] font-black text-slate-400 uppercase leading-none">VÍ {loggedUserData.username}</p>
                                            <p className="text-xs font-black text-emerald-600">{loggedUserData.balance.toLocaleString()}đ</p>
                                        </div>
                                        <button onClick={() => { setLoggedUserData(null); localStorage.removeItem('sp_session'); }} className="text-slate-400 hover:text-red-600 p-1"><i className="fa-solid fa-right-from-bracket"></i></button>
                                    </div>
                                ) : (
                                    <button onClick={() => setActiveTab('auth')} className="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl shadow-slate-200">Đăng Nhập</button>
                                )}
                                <button onClick={() => setIsCartOpen(true)} className="relative p-2.5 bg-slate-100 rounded-2xl border">
                                    <i className="fa-solid fa-cart-shopping"></i>
                                    {cart.length > 0 && <span className="absolute -top-1.5 -right-1.5 bg-red-600 text-white text-[9px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white font-bold">{cart.length}</span>}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {activeTab === 'auth' && (
                            <div className="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] shadow-2xl mt-10 border border-slate-50">
                                <div className="flex gap-4 mb-8">
                                    <button onClick={() => setAuthMode('login')} className={`flex-1 py-3 font-black text-[10px] uppercase rounded-2xl transition-all ${authMode === 'login' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-400'}`}>Đăng Nhập</button>
                                    <button onClick={() => setAuthMode('register')} className={`flex-1 py-3 font-black text-[10px] uppercase rounded-2xl transition-all ${authMode === 'register' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-400'}`}>Đăng Ký</button>
                                </div>
                                <form onSubmit={handleAuth} className="space-y-4">
                                    <input type="text" placeholder="Tên tài khoản" required value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" />
                                    <input type="password" placeholder="Mật khẩu" required value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" />
                                    {authMode === 'register' && <input type="password" placeholder="Xác nhận mật khẩu" required value={authForm.confirmPassword} onChange={e => setAuthForm({...authForm, confirmPassword: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" />}
                                    <button className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs">Tiếp Tục</button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'home' && (
                            <div className="space-y-12">
                                <div className="bg-gradient-to-br from-blue-700 to-indigo-900 rounded-[3rem] p-12 text-white relative overflow-hidden shadow-2xl">
                                    <div className="relative z-10 max-w-2xl">
                                        <h1 className="text-5xl md:text-6xl font-black mb-4 italic uppercase tracking-tighter leading-tight whitespace-pre-line">{shopSettings.bannerTitle}</h1>
                                        <p className="text-blue-100 text-lg mb-8 opacity-90 font-medium max-w-lg">{shopSettings.bannerSubtitle}</p>
                                        <div className="flex gap-4">
                                            <button onClick={() => setActiveTab('shop')} className="bg-white text-blue-900 px-8 py-3.5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Khám Phá Shop</button>
                                        </div>
                                    </div>
                                    <div className="absolute right-[-50px] bottom-[-50px] opacity-10 rotate-12"><i className="fa-solid fa-anchor text-[350px]"></i></div>
                                </div>

                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                    {items.slice(0, 4).map(item => (
                                        <div key={item.id} className="bg-white p-5 rounded-[2.5rem] border hover:shadow-xl transition-all group flex flex-col">
                                            <div className="bg-slate-50 rounded-3xl h-44 flex items-center justify-center mb-4 overflow-hidden relative">
                                                <img src={item.img} className="h-28 group-hover:scale-110 transition-transform duration-500" />
                                            </div>
                                            <div className="flex justify-between items-start mb-1 flex-grow">
                                                <div>
                                                    <p className="text-[10px] font-black text-blue-500 uppercase">{item.category}</p>
                                                    <h3 className="font-black text-sm text-slate-800 uppercase italic line-clamp-1">{item.name}</h3>
                                                </div>
                                                <p className={`text-[10px] font-bold ${item.stock > 0 ? 'text-slate-400' : 'text-red-500'}`}>Kho: {item.stock}</p>
                                            </div>
                                            <p className="text-red-600 font-black text-xl mt-1">{item.price.toLocaleString()}đ</p>
                                            <button onClick={() => handleAddToCart(item)} className={`mt-4 w-full py-3 rounded-2xl font-black text-[10px] uppercase transition-all ${item.stock > 0 ? 'bg-slate-900 text-white hover:bg-blue-600' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                                {item.stock > 0 ? 'Thêm Vào Giỏ' : 'Hết Hàng'}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'shop' && (
                            <div className="space-y-8">
                                <div className="flex flex-wrap gap-2 mb-6">
                                    {['All', 'Sword', 'Item', 'Melee', 'Gamepass'].map(cat => (
                                        <button key={cat} onClick={() => setSelectedCategory(cat)} className={`px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase transition-all ${selectedCategory === cat ? 'bg-blue-600 text-white shadow-xl' : 'bg-white text-slate-500 border'}`}>{cat}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                    {(selectedCategory === 'All' ? items : items.filter(i => i.category === selectedCategory)).map(item => (
                                        <div key={item.id} className="bg-white p-5 rounded-[2.5rem] border hover:shadow-xl transition-all group flex flex-col">
                                            <div className="bg-slate-50 rounded-3xl h-44 flex items-center justify-center mb-4 overflow-hidden">
                                                <img src={item.img} className="h-28 group-hover:scale-110 transition-transform" />
                                            </div>
                                            <div className="flex justify-between items-start mb-1 flex-grow">
                                                <div>
                                                    <p className="text-[10px] font-black text-blue-500 uppercase">{item.category}</p>
                                                    <h3 className="font-black text-sm text-slate-800 uppercase italic">{item.name}</h3>
                                                </div>
                                                <p className={`text-[10px] font-bold ${item.stock > 0 ? 'text-slate-400' : 'text-red-500'}`}>Kho: {item.stock}</p>
                                            </div>
                                            <p className="text-red-600 font-black text-xl mt-1">{item.price.toLocaleString()}đ</p>
                                            <button onClick={() => handleAddToCart(item)} className={`mt-4 w-full py-3 rounded-2xl font-black text-[10px] uppercase ${item.stock > 0 ? 'bg-slate-900 text-white' : 'bg-slate-200 text-slate-400'}`}>Mua Ngay</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'deposit' && (
                            <div className="max-w-4xl mx-auto space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border text-center">
                                        <h2 className="text-2xl font-black uppercase italic border-l-4 border-blue-600 pl-4 text-left mb-6">Chuyển Khoản</h2>
                                        <img src={shopSettings.qrUrl} className="mx-auto rounded-2xl w-64 shadow-md mb-4 border" />
                                        <p className="font-black uppercase text-lg text-slate-800">{shopSettings.accountName}</p>
                                        <p className="text-blue-600 font-black text-2xl tracking-tighter">{shopSettings.accountNumber}</p>
                                        <p className="text-[10px] font-black text-slate-400 uppercase mt-1">{shopSettings.bankName}</p>
                                    </div>
                                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border">
                                        <h3 className="font-black uppercase text-sm text-slate-400 tracking-widest mb-6">Gửi Yêu Cầu Duyệt Nạp</h3>
                                        <form onSubmit={async (e) => {
                                            e.preventDefault();
                                            if (!loggedUserData) return showNotify("Hãy đăng nhập!");
                                            const amount = parseInt(e.target.amount.value);
                                            const req = { id: Date.now(), user: loggedUserData.username, receivedValue: amount, status: 'pending', date: new Date().toLocaleString(), category: 'deposit', method: 'Chuyển khoản' };
                                            await saveToCloud({ requests: [req, ...pendingRequests], history: [req, ...transactionHistory] });
                                            showNotify("Đã gửi yêu cầu nạp tiền!");
                                            e.target.reset();
                                        }} className="space-y-4">
                                            <input name="amount" type="number" required placeholder="Số tiền đã chuyển" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold" />
                                            <button className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl">Xác Nhận Đã Chuyển</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'admin' && loggedUserData?.role === 'admin' && (
                            <div className="space-y-8 pb-20">
                                <div className="bg-slate-900 text-white p-8 rounded-[2rem] flex justify-between items-center shadow-2xl border border-white/10">
                                    <div><h2 className="text-3xl font-black italic uppercase">Quản Trị Shop</h2><p className="text-slate-400">Đang hoạt động trên Cloud Firestore</p></div>
                                    <div className="text-center bg-white/10 p-4 rounded-2xl"><p className="text-[10px] text-blue-400 font-black">CHỜ XỬ LÝ</p><p className="text-3xl font-black">{pendingRequests.length}</p></div>
                                </div>

                                <div className="grid lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-2 space-y-8">
                                        <div className="bg-white p-8 rounded-[2rem] border shadow-sm">
                                            <h3 className="font-black text-xs uppercase text-slate-400 mb-6 flex items-center gap-2"><i className="fa-solid fa-clock"></i> Đơn hàng mới</h3>
                                            <div className="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                                                {pendingRequests.map(req => (
                                                    <div key={req.id} className="p-5 bg-slate-50 rounded-3xl border flex justify-between items-center gap-4">
                                                        <div className="flex gap-4 items-center">
                                                            <div className={`w-12 h-12 rounded-xl flex items-center justify-center ${req.category === 'deposit' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-blue-600'}`}><i className={`fa-solid ${req.category === 'deposit' ? 'fa-wallet' : 'fa-cart-shopping'}`}></i></div>
                                                            <div>
                                                                <p className="font-black text-slate-800 text-xs uppercase">{req.user} - {req.method || 'Đơn hàng'}</p>
                                                                <p className="text-red-600 font-black">{(req.receivedValue || req.total).toLocaleString()}đ</p>
                                                                {req.robloxUser && <p className="text-[9px] font-black text-blue-500 uppercase">Roblox: {req.robloxUser}</p>}
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => handleApprove(req.id)} className="px-5 py-2.5 bg-emerald-500 text-white rounded-xl text-[10px] font-black uppercase">Duyệt</button>
                                                            <button onClick={() => saveToCloud({ requests: pendingRequests.filter(r => r.id !== req.id), history: transactionHistory.map(h => h.id === req.id ? {...h, status: 'rejected'} : h) })} className="px-5 py-2.5 bg-red-500 text-white rounded-xl text-[10px] font-black uppercase">Hủy</button>
                                                        </div>
                                                    </div>
                                                ))}
                                                {pendingRequests.length === 0 && <p className="text-center text-slate-400 italic py-10">Tất cả đơn hàng đã được xử lý.</p>}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-8">
                                        <div className="bg-white p-8 rounded-[2rem] border shadow-sm">
                                            <h3 className="font-black text-xs text-slate-400 mb-6 uppercase">Cài đặt shop</h3>
                                            <div className="space-y-4">
                                                <input value={shopSettings.accountNumber} onChange={e => setShopSettings({...shopSettings, accountNumber: e.target.value})} placeholder="Số tài khoản" className="w-full p-3 border rounded-xl text-xs font-bold" />
                                                <input value={shopSettings.qrUrl} onChange={e => setShopSettings({...shopSettings, qrUrl: e.target.value})} placeholder="Link QR" className="w-full p-3 border rounded-xl text-xs font-bold" />
                                                <button onClick={() => saveToCloud({ settings: shopSettings })} className="w-full py-3 bg-slate-900 text-white font-black text-[10px] uppercase rounded-xl">Lưu Cấu Hình</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="max-w-4xl mx-auto space-y-8 pb-20">
                                <h2 className="text-2xl font-black uppercase italic border-l-4 border-blue-600 pl-4">Lịch Sử Giao Dịch</h2>
                                <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[9px] font-black text-slate-400 uppercase tracking-widest border-b">
                                            <tr><th className="px-6 py-5">Ngày</th><th className="px-6 py-5">Nội Dung</th><th className="px-6 py-5 text-center">Trạng Thái</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {transactionHistory.filter(h => h.user === loggedUserData?.username || loggedUserData?.role === 'admin').map(h => (
                                                <tr key={h.id} className="text-xs hover:bg-slate-50 transition-colors">
                                                    <td className="px-6 py-5 text-slate-500 font-bold">{h.date}</td>
                                                    <td className="px-6 py-5">
                                                        <p className="font-black uppercase text-slate-800">{h.category === 'deposit' ? `Nạp: ${h.method}` : `Mua: ${h.items.length} món`}</p>
                                                        <p className="text-red-600 font-bold">{(h.receivedValue || h.total).toLocaleString()}đ</p>
                                                    </td>
                                                    <td className="px-6 py-5 text-center">
                                                        <span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest ${h.status === 'pending' ? 'bg-orange-100 text-orange-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                                            {h.status === 'pending' ? 'Chờ duyệt' : 'Thành công'}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {isCartOpen && (
                        <div className="fixed inset-0 z-[100] flex justify-end">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-in slide-in-from-right duration-300">
                                <div className="p-8 border-b bg-slate-900 text-white flex justify-between items-center">
                                    <h2 className="font-black uppercase italic text-xl flex items-center gap-2"><i className="fa-solid fa-cart-shopping"></i> Giỏ Hàng</h2>
                                    <button onClick={() => setIsCartOpen(false)}><i className="fa-solid fa-xmark text-2xl"></i></button>
                                </div>
                                <div className="flex-grow overflow-y-auto p-6 space-y-4 custom-scrollbar">
                                    {cart.map(i => (
                                        <div key={i.id} className="bg-slate-50 p-4 rounded-3xl border flex gap-4">
                                            <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center p-2 border"><img src={i.img} className="w-full h-full object-contain" /></div>
                                            <div className="flex-grow">
                                                <p className="text-xs font-black text-slate-800 uppercase italic line-clamp-1">{i.name}</p>
                                                <div className="flex justify-between items-center mt-2">
                                                    <p className="text-sm font-black text-red-600">{(i.price * i.qty).toLocaleString()}đ</p>
                                                    <div className="flex items-center gap-2">
                                                        <button onClick={() => setCart(cart.map(x => x.id === i.id ? {...x, qty: Math.max(0, x.qty - 1)} : x).filter(x => x.qty > 0))} className="w-8 h-8 bg-white border rounded-lg">-</button>
                                                        <span className="text-xs font-black">{i.qty}</span>
                                                        <button onClick={() => handleAddToCart(i)} className="w-8 h-8 bg-white border rounded-lg">+</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {cart.length > 0 && (
                                    <div className="p-8 border-t space-y-6">
                                        <div className="bg-blue-50 p-5 rounded-3xl border">
                                            <label className="text-[10px] font-black text-blue-800 uppercase mb-2 block">Roblox ID Nhận Đồ</label>
                                            <input value={robloxUsername} onChange={e => setRobloxUsername(e.target.value)} placeholder="Nhập tên đăng nhập Roblox..." className="w-full p-4 bg-white border rounded-2xl font-black text-sm outline-none shadow-sm" />
                                        </div>
                                        <button onClick={checkout} className="w-full py-5 bg-blue-600 text-white font-black rounded-2xl uppercase shadow-xl hover:bg-blue-700">Xác nhận thanh toán: {(cart.reduce((s,i) => s + (i.price * i.qty), 0)).toLocaleString()}đ</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <footer className="bg-slate-900 text-white mt-10 pt-16 pb-8 px-4 border-t-4 border-blue-600">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-3 gap-12 border-b border-white/10 pb-12 text-center md:text-left">
                            <div className="space-y-6">
                                <div className="flex items-center gap-2 justify-center md:justify-start">
                                    <div className="bg-blue-600 p-2.5 rounded-xl"><i className="fa-solid fa-anchor text-[24px]"></i></div>
                                    <span className="text-3xl font-black uppercase italic tracking-tighter">Sailor<span className="text-blue-500">Shop</span></span>
                                </div>
                                <p className="text-slate-400 text-sm font-medium">Hệ thống Sailor Piece uy tín hàng đầu. Cam kết bảo mật, đồng bộ dữ liệu đám mây.</p>
                            </div>
                        </div>
                        <p className="text-center text-[10px] font-black text-slate-600 uppercase tracking-widest mt-8 italic">© 2024 Sailor Piece Market. Designed by Yewan.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
