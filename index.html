<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailor Piece Shop - Cloud Sync</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDK v10 Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // CẤU HÌNH FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCJc-eSqmw5XwZZUVHA7GbQnTF6k36MmJE",
            authDomain: "sailorshop-afc79.firebaseapp.com",
            databaseURL: "https://sailorshop-afc79-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sailorshop-afc79",
            storageBucket: "sailorshop-afc79.firebasestorage.app",
            messagingSenderId: "383701342105",
            appId: "1:383701342105:web:77e04062ceaf2fd895e508",
            measurementId: "G-Q881Z569QH"
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [loggedUserData, setLoggedUserData] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [notification, setNotification] = useState(null);
            
            const [items, setItems] = useState([]);
            const [registeredUsers, setRegisteredUsers] = useState([]);
            const [pendingRequests, setPendingRequests] = useState([]);
            const [transactionHistory, setTransactionHistory] = useState([]);
            const [shopSettings, setShopSettings] = useState({
                bannerTitle: "CHINH PHỤC \n ĐẠI HẢI TRÌNH",
                bannerSubtitle: "Hệ thống phân phối vật phẩm Sailor Piece chuyên nghiệp.",
                checkoutMsg: "Cảm ơn bạn đã đặt hàng! Vui lòng liên hệ Admin qua Fanpage để nhận đồ."
            });

            const [cart, setCart] = useState([]);
            const [robloxUsername, setRobloxUsername] = useState('');
            const [authMode, setAuthMode] = useState('login');
            const [authForm, setAuthForm] = useState({ username: '', password: '' });
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [showCheckoutSuccess, setShowCheckoutSuccess] = useState(false);

            // Nạp tiền State
            const [depositType, setDepositType] = useState('bank'); // 'bank' hoặc 'card'
            const [cardValue, setCardValue] = useState(10000);

            const [uploadingImg, setUploadingImg] = useState(false); // Trạng thái đang tải ảnh

            const appId = "sailor-shop-afc79-main"; 
            const FANPAGE_URL = "https://www.facebook.com/share/17KdJjb5XM/";

            const showNotify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            // Hàm xử lý tải ảnh lên Firebase Storage
            const uploadImageToStorage = async (file) => {
                if (!file) return null;
                try {
                    const storageRef = firebase.storage().ref();
                    const fileRef = storageRef.child(`shop_images/${Date.now()}_${file.name}`);
                    await fileRef.put(file);
                    return await fileRef.getDownloadURL();
                } catch (error) {
                    showNotify("Lỗi tải ảnh. Vui lòng kiểm tra quyền Storage trên Firebase!");
                    console.error("Storage Error:", error);
                    return null;
                }
            };

            useEffect(() => {
                const startFirebase = async () => {
                    try {
                        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                        const db = firebase.firestore();
                        const auth = firebase.auth();
                        await auth.signInAnonymously();

                        const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data')
                            .onSnapshot((snap) => {
                                if (snap.exists) {
                                    const data = snap.data();
                                    setItems(data.items || []);
                                    setRegisteredUsers(data.users || []);
                                    setPendingRequests(data.requests || []);
                                    setTransactionHistory(data.history || []);
                                    if (data.settings) setShopSettings(prev => ({ ...prev, ...data.settings }));
                                }
                                setIsLoading(false);
                            }, (err) => {
                                setIsLoading(false);
                            });

                        const saved = localStorage.getItem('sp_session');
                        if (saved) setLoggedUserData(JSON.parse(saved));
                        return () => unsub();
                    } catch (error) {
                        setIsLoading(false);
                    }
                };
                startFirebase();
            }, []);

            const saveToCloud = async (updates) => {
                try {
                    const db = firebase.firestore();
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').update(updates);
                } catch (e) {
                    showNotify("Lỗi đồng bộ!");
                }
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                if (authMode === 'register') {
                    if (registeredUsers.find(u => u.username === authForm.username)) return showNotify("Tài khoản đã tồn tại!");
                    const newUser = { username: authForm.username, password: authForm.password, balance: 0, role: 'user' };
                    await saveToCloud({ users: [...registeredUsers, newUser] });
                    showNotify("Đăng ký thành công!");
                    setAuthMode('login');
                } else {
                    if (authForm.username === 'Yewan' && authForm.password === 'Botditcogiao113!') {
                        const admin = { username: 'Yewan', role: 'admin', balance: 999999999 };
                        setLoggedUserData(admin);
                        localStorage.setItem('sp_session', JSON.stringify(admin));
                        setActiveTab('admin');
                        return;
                    }
                    const found = registeredUsers.find(u => u.username === authForm.username && u.password === authForm.password);
                    if (found) {
                        setLoggedUserData(found);
                        localStorage.setItem('sp_session', JSON.stringify(found));
                        setActiveTab('home');
                    } else showNotify("Sai thông tin!");
                }
            };

            const handleAddToCart = (item) => {
                if (item.stock <= 0) return showNotify("Hết hàng!");
                const existing = cart.find(i => i.id === item.id);
                if (existing) setCart(cart.map(i => i.id === item.id ? { ...i, qty: i.qty + 1 } : i));
                else setCart([...cart, { ...item, qty: 1 }]);
                showNotify("Đã thêm giỏ hàng!");
            };

            const checkout = async () => {
                if (!robloxUsername) return showNotify("Nhập Roblox ID!");
                const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
                if (!loggedUserData || loggedUserData.balance < total) return showNotify("Không đủ tiền!");

                const order = { id: Date.now(), user: loggedUserData.username, robloxUser: robloxUsername, items: [...cart], total, status: 'pending', date: new Date().toLocaleString(), category: 'order' };
                const updatedUsers = registeredUsers.map(u => u.username === loggedUserData.username ? { ...u, balance: u.balance - total } : u);
                const updatedItems = items.map(it => {
                    const c = cart.find(x => x.id === it.id);
                    return c ? { ...it, stock: it.stock - c.qty } : it;
                });

                await saveToCloud({ users: updatedUsers, items: updatedItems, requests: [order, ...pendingRequests], history: [order, ...transactionHistory] });
                
                if (loggedUserData.role !== 'admin') {
                    const updatedMe = { ...loggedUserData, balance: loggedUserData.balance - total };
                    setLoggedUserData(updatedMe);
                    localStorage.setItem('sp_session', JSON.stringify(updatedMe));
                }
                setCart([]); setIsCartOpen(false); setShowCheckoutSuccess(true);
            };

            if (isLoading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white font-black uppercase tracking-widest">
                    <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p>Đồng bộ Cloud...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 pb-24 md:pb-10 animate-fade-in">
                    {notification && (
                        <div className="fixed top-20 right-4 z-[120] bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border-l-4 border-blue-500 animate-in slide-in-from-right-full">
                            <i className="fa-solid fa-bolt text-yellow-400"></i>
                            <p className="text-sm font-bold">{notification}</p>
                        </div>
                    )}

                    {showCheckoutSuccess && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowCheckoutSuccess(false)}></div>
                            <div className="relative bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl border animate-in zoom-in-95">
                                <div className="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-circle-check text-[40px]"></i></div>
                                <h3 className="text-2xl font-black text-center uppercase italic text-slate-800 mb-2">Thành Công!</h3>
                                <div className="bg-blue-50 p-5 rounded-3xl mb-8 text-sm font-bold text-slate-700 text-center italic">{shopSettings.checkoutMsg}</div>
                                <a href={FANPAGE_URL} target="_blank" className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs flex items-center justify-center gap-2 mb-3 shadow-lg shadow-blue-100"><i className="fa-brands fa-facebook-messenger text-lg"></i> Chat Với Admin</a>
                                <button onClick={() => setShowCheckoutSuccess(false)} className="w-full py-4 bg-slate-100 text-slate-500 font-black rounded-2xl uppercase text-xs">Đóng</button>
                            </div>
                        </div>
                    )}

                    <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b h-16 flex items-center px-4">
                        <div className="max-w-7xl mx-auto w-full flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveTab('home')}>
                                <div className="bg-blue-600 text-white p-2 rounded-xl"><i className="fa-solid fa-anchor"></i></div>
                                <span className="text-lg font-black uppercase italic tracking-tighter">Sailor<span className="text-blue-600">Shop</span></span>
                            </div>
                            <nav className="hidden md:flex gap-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-blue-600' : ''}>Trang Chủ</button>
                                <button onClick={() => setActiveTab('shop')} className={activeTab === 'shop' ? 'text-blue-600' : ''}>Sản Phẩm</button>
                                <button onClick={() => setActiveTab('deposit')} className={activeTab === 'deposit' ? 'text-blue-600' : ''}>Nạp Tiền</button>
                                {loggedUserData && <button onClick={() => setActiveTab('history')}>Lịch Sử</button>}
                                {loggedUserData?.role === 'admin' && <button onClick={() => setActiveTab('admin')} className="text-orange-500 flex items-center gap-1"><i className="fa-solid fa-gear"></i> QUẢN TRỊ</button>}
                            </nav>
                            <div className="flex items-center gap-3">
                                {loggedUserData ? (
                                    <div className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-2xl border">
                                        <div className="text-right hidden sm:block">
                                            <p className="text-[8px] font-black text-slate-400 uppercase">VÍ {loggedUserData.username}</p>
                                            <p className="text-xs font-black text-emerald-600">{loggedUserData.balance.toLocaleString()}đ</p>
                                        </div>
                                        <button onClick={() => { setLoggedUserData(null); localStorage.removeItem('sp_session'); setActiveTab('home'); }} className="text-slate-400 hover:text-red-600 ml-2"><i className="fa-solid fa-right-from-bracket"></i></button>
                                    </div>
                                ) : (
                                    <button onClick={() => setActiveTab('auth')} className="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest">Đăng Nhập</button>
                                )}
                                <button onClick={() => setIsCartOpen(true)} className="relative p-2.5 bg-slate-100 rounded-2xl border">
                                    <i className="fa-solid fa-cart-shopping"></i>
                                    {cart.length > 0 && <span className="absolute -top-1.5 -right-1.5 bg-red-600 text-white text-[9px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">{cart.length}</span>}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {activeTab === 'auth' && (
                            <div className="max-w-md mx-auto bg-white p-6 md:p-10 rounded-3xl md:rounded-[2.5rem] shadow-2xl mt-10 border">
                                <div className="flex gap-4 mb-8">
                                    <button onClick={() => setAuthMode('login')} className={`flex-1 py-3 font-black text-[10px] uppercase rounded-2xl ${authMode === 'login' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-400'}`}>Đăng Nhập</button>
                                    <button onClick={() => setAuthMode('register')} className={`flex-1 py-3 font-black text-[10px] uppercase rounded-2xl ${authMode === 'register' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-400'}`}>Đăng Ký</button>
                                </div>
                                <form onSubmit={handleAuth} className="space-y-4">
                                    <input type="text" placeholder="Tên tài khoản" required value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" />
                                    <input type="password" placeholder="Mật khẩu" required value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" />
                                    <button className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest">Xác Nhận</button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'home' && (
                            <div className="space-y-12">
                                <div className="bg-gradient-to-br from-blue-700 to-indigo-900 rounded-3xl md:rounded-[3rem] p-6 md:p-12 text-white relative overflow-hidden shadow-2xl">
                                    <div className="relative z-10 max-w-2xl">
                                        <h1 className="text-4xl md:text-5xl lg:text-6xl font-black mb-4 italic uppercase leading-tight whitespace-pre-line">{shopSettings.bannerTitle}</h1>
                                        <p className="text-blue-100 text-sm md:text-lg mb-8 opacity-90 font-medium max-w-lg">{shopSettings.bannerSubtitle}</p>
                                        <button onClick={() => setActiveTab('shop')} className="bg-white text-blue-900 px-6 md:px-8 py-3.5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Mua Hàng Ngay</button>
                                    </div>
                                    <div className="absolute right-[-50px] bottom-[-50px] opacity-10 rotate-12"><i className="fa-solid fa-anchor text-[250px] md:text-[350px]"></i></div>
                                </div>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                                    {items.slice(0, 4).map(item => (
                                        <div key={item.id} className="bg-white p-4 md:p-5 rounded-3xl md:rounded-[2.5rem] border hover:shadow-xl transition-all group flex flex-col">
                                            <div className="bg-slate-50 rounded-2xl md:rounded-3xl h-32 md:h-44 flex items-center justify-center mb-4 overflow-hidden relative">
                                                <img src={item.img || 'https://api.dicebear.com/7.x/shapes/svg?seed=none'} classNa
