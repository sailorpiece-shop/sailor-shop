<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailor Piece Shop - Firestore Cloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- FIREBASE SDK v11 -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      // ==========================================
      // DÁN MÃ CONFIG FIREBASE CỦA BẠN VÀO ĐÂY
      // ==========================================
      const firebaseConfig = { 
  apiKey : "AIzaSyC4ZzPH9HBdoOB4HLYb9JwyLrl7NzLk-IU" , 
  authDomain : "sailorshop-6a306.firebaseapp.com" , 
  projectId : "sailorshop-6a306" , 
  storageBucket : "sailorshop-6a306.firebasestorage.app" , 
  messagingSenderId : "143554811645" , 
  appId : "1:143554811645:web:5d63134ea5a1a55df65094" , 
  measurementId : "G-41YMKJX8LM" }

      // Biến global để React truy cập
      window.fbConfig = firebaseConfig;
      window.fbSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, updateDoc, arrayUnion };
    </script>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
          const [db, setDb] = useState(null);
          const [auth, setAuth] = useState(null);
          const [currentUser, setCurrentUser] = useState(null);
          const [appId] = useState(typeof __app_id !== 'undefined' ? __app_id : 'sailor-shop-v1');

          // --- UI States ---
          const [activeTab, setActiveTab] = useState('home');
          const [isCartOpen, setIsCartOpen] = useState(false);
          const [notification, setNotification] = useState(null);
          const [isLoading, setIsLoading] = useState(true);
          const [configMissing, setConfigMissing] = useState(false);

          // --- Cloud States ---
          const [registeredUsers, setRegisteredUsers] = useState([]);
          const [items, setItems] = useState([]);
          const [pendingRequests, setPendingRequests] = useState([]);
          const [transactionHistory, setTransactionHistory] = useState([]);
          const [bankInfo, setBankInfo] = useState({ qrUrl: "", accountName: "CHƯA CÀI", accountNumber: "000", bankName: "BANK" });
          const [bannerInfo, setBannerInfo] = useState({ title: "CHINH PHỤC \n ĐẠI HẢI TRÌNH", subtitle: "Hệ thống chuyên nghiệp" });
          const [checkoutMessage, setCheckoutMessage] = useState("Cảm ơn bạn đã đặt hàng!");

          // --- Local UI States ---
          const [cart, setCart] = useState([]);
          const [robloxUsername, setRobloxUsername] = useState('');
          const [authMode, setAuthMode] = useState('login');
          const [authForm, setAuthForm] = useState({ username: '', password: '', confirmPassword: '' });
          const [newItem, setNewItem] = useState({ name: '', price: '', stock: '', category: 'Sword' });
          const [targetUser, setTargetUser] = useState('');
          const [adjustAmount, setAdjustAmount] = useState('');
          const [selectedCategory, setSelectedCategory] = useState('All');
          const [showCheckoutSuccess, setShowCheckoutSuccess] = useState(false);

          const FANPAGE_URL = "https://www.facebook.com/share/17KdJjb5XM/";

          const showNotify = (msg) => {
            setNotification(msg);
            setTimeout(() => setNotification(null), 3000);
          };

          // 1. Initialize Firebase & Auth
          useEffect(() => {
            const init = async () => {
              if (!window.fbConfig || !window.fbConfig.apiKey) {
                setConfigMissing(true);
                setIsLoading(false);
                return;
              }

              const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore } = window.fbSDK;
              const app = initializeApp(window.fbConfig);
              const fbAuth = getAuth(app);
              const fbDb = getFirestore(app);

              setAuth(fbAuth);
              setDb(fbDb);

              await signInAnonymously(fbAuth);
              onAuthStateChanged(fbAuth, (user) => {
                if (user) {
                  // Session local
                  const saved = localStorage.getItem('sp_session');
                  if (saved) setCurrentUser(JSON.parse(saved));
                }
              });
            };
            init();
          }, []);

          // 2. Sync Data from Firestore
          useEffect(() => {
            if (!db) return;
            const { doc, onSnapshot, collection } = window.fbSDK;

            // Sync Settings & Global State
            const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'settings'), (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.bank) setBankInfo(data.bank);
                if (data.banner) setBannerInfo(data.banner);
                if (data.msg) setCheckoutMessage(data.msg);
                if (data.items) setItems(data.items);
                if (data.users) setRegisteredUsers(data.users);
                if (data.requests) setPendingRequests(data.requests);
                if (data.history) setTransactionHistory(data.history);
              }
              setIsLoading(false);
            }, (err) => console.error("Snapshot error:", err));

            return () => unsubSettings();
          }, [db, appId]);

          // Helper to save data
          const saveToCloud = async (updates) => {
            if (!db) return;
            const { doc, setDoc } = window.fbSDK;
            try {
              // Lấy data hiện tại để merge
              const docRef = doc(db, 'artifacts', appId, 'public', 'settings');
              const snap = await window.fbSDK.getDoc(docRef);
              const currentData = snap.exists() ? snap.data() : {};
              await setDoc(docRef, { ...currentData, ...updates }, { merge: true });
            } catch (e) {
              showNotify("Lỗi lưu trữ Cloud!");
              console.error(e);
            }
          };

          const handleAuth = (e) => {
            e.preventDefault();
            if (authMode === 'register') {
              if (authForm.password !== authForm.confirmPassword) return showNotify("Mật khẩu không khớp!");
              if (registeredUsers.find(u => u.username === authForm.username)) return showNotify("Tài khoản đã tồn tại!");
              const newUser = { username: authForm.username, password: authForm.password, balance: 0, role: 'user' };
              const newList = [...registeredUsers, newUser];
              saveToCloud({ users: newList });
              showNotify("Đăng ký thành công!");
              setAuthMode('login');
            } else {
              if (authForm.username === 'Yewan' && authForm.password === 'Botditcogiao113!') {
                const admin = { name: 'Yewan', balance: 999999999, role: 'admin' };
                setCurrentUser(admin);
                localStorage.setItem('sp_session', JSON.stringify(admin));
                setActiveTab('admin');
              } else {
                const found = registeredUsers.find(u => u.username === authForm.username && u.password === authForm.password);
                if (found) {
                  setCurrentUser(found);
                  localStorage.setItem('sp_session', JSON.stringify(found));
                  setActiveTab('home');
                } else showNotify("Sai thông tin!");
              }
            }
          };

          const handleLogout = () => {
            setCurrentUser(null);
            localStorage.removeItem('sp_session');
            setActiveTab('home');
          };

          const handleAddToCart = (item) => {
            if (item.stock <= 0) return showNotify("Hết hàng!");
            const existing = cart.find(i => i.id === item.id);
            if (existing && existing.qty >= item.stock) return showNotify("Hết hàng trong kho!");
            if (existing) setCart(cart.map(i => i.id === item.id ? {...i, qty: i.qty + 1} : i));
            else setCart([...cart, {...item, qty: 1}]);
            showNotify("Đã thêm giỏ hàng!");
          };

          const checkout = async () => {
            if (!robloxUsername) return showNotify("Nhập Roblox ID!");
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            if (!currentUser || currentUser.balance < total) return showNotify("Không đủ tiền!");

            const order = { id: Date.now(), user: currentUser.name, robloxUser: robloxUsername, items: [...cart], total, status: 'pending', date: new Date().toLocaleString(), category: 'order' };
            
            // Updates
            const updatedUsers = registeredUsers.map(u => u.username === currentUser.name ? {...u, balance: u.balance - total} : u);
            const updatedItems = items.map(it => {
              const c = cart.find(x => x.id === it.id);
              return c ? { ...it, stock: it.stock - c.qty } : it;
            });

            await saveToCloud({
              users: updatedUsers,
              items: updatedItems,
              requests: [order, ...pendingRequests],
              history: [order, ...transactionHistory]
            });

            if (currentUser.role !== 'admin') setCurrentUser({...currentUser, balance: currentUser.balance - total});
            setCart([]);
            setIsCartOpen(false);
            setShowCheckoutSuccess(true);
          };

          const handleApprove = async (id) => {
            const req = pendingRequests.find(r => r.id === id);
            if (!req) return;

            let updatedUsers = [...registeredUsers];
            if (req.category === 'deposit') {
              updatedUsers = registeredUsers.map(u => u.username === req.user ? {...u, balance: u.balance + req.receivedValue} : u);
              if (currentUser && currentUser.name === req.user) setCurrentUser({...currentUser, balance: currentUser.balance + req.receivedValue});
            }

            await saveToCloud({
              users: updatedUsers,
              history: transactionHistory.map(h => h.id === id ? {...h, status: req.category === 'deposit' ? 'approved' : 'completed'} : h),
              requests: pendingRequests.filter(r => r.id !== id)
            });
            showNotify("Đã duyệt!");
          };

          const handleReject = async (id) => {
            const req = pendingRequests.find(r => r.id === id);
            if (!req) return;

            let updatedUsers = [...registeredUsers];
            let updatedItems = [...items];

            if (req.category === 'order') {
              updatedUsers = registeredUsers.map(u => u.username === req.user ? {...u, balance: u.balance + req.total} : u);
              updatedItems = items.map(it => {
                const c = req.items.find(x => x.id === it.id);
                return c ? {...it, stock: it.stock + c.qty} : it;
              });
            }

            await saveToCloud({
              users: updatedUsers,
              items: updatedItems,
              history: transactionHistory.map(h => h.id === id ? {...h, status: 'rejected'} : h),
              requests: pendingRequests.filter(r => r.id !== id)
            });
            showNotify("Đã từ chối!");
          };

          if (configMissing) return (
            <div className="h-screen flex flex-col items-center justify-center p-6 bg-slate-50 text-center">
              <div className="bg-white p-8 rounded-[2rem] shadow-xl border max-w-md">
                <i className="fa-solid fa-triangle-exclamation text-orange-500 text-5xl mb-4"></i>
                <h1 className="text-xl font-black uppercase mb-4">Cấu hình chưa đúng</h1>
                <p className="text-slate-500 text-sm mb-6">Bạn cần dán mã <b>Firebase Config</b> của mình vào dòng 18 trong file index.html để web có thể kết nối đám mây.</p>
                <div className="bg-slate-100 p-4 rounded-xl font-mono text-xs text-left overflow-x-auto">
                  const firebaseConfig = &#123;<br/>
                  &nbsp;&nbsp;apiKey: "...",<br/>
                  &nbsp;&nbsp;projectId: "..."<br/>
                  &#125;;
                </div>
              </div>
            </div>
          );

          if (isLoading) return (
            <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
              <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
              <p className="text-[10px] font-black uppercase tracking-[0.3em]">Kết nối Firestore...</p>
            </div>
          );

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans pb-10 selection:bg-blue-100">
               {/* Notif */}
               {notification && (
                <div className="fixed top-20 right-4 z-[120] bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border-l-4 border-blue-500 animate-in slide-in-from-right-full">
                  <i className="fa-solid fa-bolt text-yellow-400"></i>
                  <p className="text-sm font-bold">{notification}</p>
                </div>
              )}

              {/* Success Popup */}
              {showCheckoutSuccess && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
                   <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowCheckoutSuccess(false)}></div>
                   <div className="relative bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl animate-in zoom-in-95 border">
                      <div className="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-circle-check text-[40px]"></i></div>
                      <h3 className="text-2xl font-black text-center uppercase italic text-slate-800 mb-2">Thành Công!</h3>
                      <div className="bg-blue-50 p-5 rounded-3xl mb-8 text-sm font-bold text-slate-700 leading-relaxed text-center whitespace-pre-wrap">{checkoutMessage}</div>
                      <a href={FANPAGE_URL} target="_blank" className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs flex items-center justify-center gap-2 mb-3"><i className="fa-brands fa-facebook-messenger"></i> Nhắn Fanpage Để Nhận Đồ</a>
                      <button onClick={() => setShowCheckoutSuccess(false)} className="w-full py-4 bg-slate-100 text-slate-500 font-black rounded-2xl uppercase text-xs">Đóng</button>
                   </div>
                </div>
              )}

              {/* Header */}
              <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b h-16 flex items-center px-4">
                <div className="max-w-7xl mx-auto w-full flex justify-between items-center">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveTab('home')}>
                    <div className="bg-blue-600 text-white p-2 rounded-xl flex items-center justify-center w-9 h-9"><i className="fa-solid fa-anchor"></i></div>
                    <span className="text-lg font-black uppercase italic">Sailor<span className="text-blue-600">Shop</span></span>
                  </div>
                  <nav className="hidden md:flex gap-6 text-[10px] font-black uppercase text-slate-400">
                    <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-blue-600' : ''}>Trang Chủ</button>
                    <button onClick={() => setActiveTab('shop')} className={activeTab === 'shop' ? 'text-blue-600' : ''}>Sản Phẩm</button>
                    <button onClick={() => setActiveTab('deposit')} className={activeTab === 'deposit' ? 'text-blue-600' : ''}>Nạp Tiền</button>
                    {currentUser && <button onClick={() => setActiveTab('history')} className={activeTab === 'history' ? 'text-blue-600' : ''}>Lịch Sử</button>}
                    {currentUser?.role === 'admin' && <button onClick={() => setActiveTab('admin')} className="text-orange-500 flex items-center gap-1.5"><i className="fa-solid fa-gear"></i> QUẢN TRỊ</button>}
                  </nav>
                  <div className="flex items-center gap-3">
                    {currentUser ? (
                      <div className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-2xl border">
                        <div className="text-right hidden sm:block">
                          <p className="text-[8px] font-black text-slate-400 uppercase">Ví của {currentUser.username}</p>
                          <p className="text-xs font-black text-emerald-600">{currentUser.balance.toLocaleString()}đ</p>
                        </div>
                        <button onClick={handleLogout} className="text-slate-400 hover:text-red-600 p-1"><i className="fa-solid fa-right-from-bracket"></i></button>
                      </div>
                    ) : (
                      <button onClick={() => setActiveTab('auth')} className="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest">Đăng Nhập</button>
                    )}
                    <button onClick={() => setIsCartOpen(true)} className="relative p-2.5 bg-slate-100 rounded-2xl flex items-center justify-center">
                      <i className="fa-solid fa-cart-shopping"></i>
                      {cart.length > 0 && <span className="absolute -top-1.5 -right-1.5 bg-red-600 text-white text-[9px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">{cart.length}</span>}
                    </button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-4 py-8">
                {/* Auth View */}
                {activeTab === 'auth' && (
                  <div className="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] shadow-2xl mt-10 border border-slate-50">
                    <div className="flex gap-4 mb-8">
                      <button onClick={() => setAuthMode('login')} className={`flex-1 py-3 font-black text-[10px] uppercase rounded-2xl ${authMode === 'login' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-400'}`}>Đăng Nhập</button>
                      <button onClick={() => setAuthMode('register')} className={`flex-1 py-3 font-black text-[10px] uppercase rounded-2xl ${authMode === 'register' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-400'}`}>Đăng Ký</button>
                    </div>
                    <form onSubmit={handleAuth} className="space-y-4">
                      <input type="text" placeholder="Tên tài khoản" required value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" />
                      <input type="password" placeholder="Mật khẩu" required value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" />
                      {authMode === 'register' && <input type="password" placeholder="Xác nhận mật khẩu" required value={authForm.confirmPassword} onChange={e => setAuthForm({...authForm, confirmPassword: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" />}
                      <button className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest">{authMode === 'login' ? 'Đăng Nhập' : 'Đăng Ký'}</button>
                    </form>
                  </div>
                )}

                {/* Home View */}
                {activeTab === 'home' && (
                   <div className="space-y-12 animate-in fade-in duration-500">
                    <div className="bg-gradient-to-br from-blue-700 to-indigo-900 rounded-[3rem] p-12 text-white relative overflow-hidden shadow-2xl">
                      <div className="relative z-10 max-w-2xl">
                        <h1 className="text-5xl md:text-6xl font-black mb-4 italic uppercase tracking-tighter leading-tight whitespace-pre-line">{bannerInfo.title}</h1>
                        <p className="text-blue-100 text-lg mb-8 opacity-90 font-medium max-w-lg">{bannerInfo.subtitle}</p>
                        <button onClick={() => setActiveTab('shop')} className="bg-white text-blue-900 px-8 py-3.5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg hover:bg-yellow-400 transition-all">Xem Sản Phẩm Ngay</button>
                      </div>
                      <div className="absolute right-[-50px] bottom-[-50px] opacity-10 rotate-12"><i className="fa-solid fa-anchor text-[350px]"></i></div>
                    </div>

                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                      {items.slice(0, 4).map(item => (
                        <div key={item.id} className="bg-white p-5 rounded-[2.5rem] border hover:shadow-xl transition-all group flex flex-col">
                          <div className="bg-slate-50 rounded-3xl h-44 flex items-center justify-center mb-4 overflow-hidden relative">
                            <img src={item.img} className="h-28 group-hover:scale-110 transition-transform duration-500" />
                          </div>
                          <div className="flex justify-between items-start mb-1 flex-grow">
                             <div>
                               <p className="text-[10px] font-black text-blue-500 uppercase">{item.category}</p>
                               <h3 className="font-black text-sm text-slate-800 uppercase italic line-clamp-1">{item.name}</h3>
                             </div>
                             <p className={`text-[10px] font-bold ${item.stock > 0 ? 'text-slate-400' : 'text-red-500'}`}>Kho: {item.stock}</p>
                          </div>
                          <p className="text-red-600 font-black text-xl tracking-tighter mt-1">{item.price.toLocaleString()}đ</p>
                          <button onClick={() => handleAddToCart(item)} className={`mt-4 w-full py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest ${item.stock > 0 ? 'bg-slate-900 text-white hover:bg-blue-600' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                            {item.stock > 0 ? 'Thêm Vào Giỏ' : 'Hết Hàng'}
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Shop View */}
                {activeTab === 'shop' && (
                  <div className="space-y-8 animate-in fade-in">
                    <div className="flex flex-wrap gap-2 mb-6">
                      {['All', 'Sword', 'Melee', 'Item', 'Gamepass'].map(cat => (
                        <button key={cat} onClick={() => setSelectedCategory(cat)} className={`px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest ${selectedCategory === cat ? 'bg-blue-600 text-white shadow-xl' : 'bg-white text-slate-500 border'}`}>
                          {cat === 'All' ? 'Tất cả' : cat}
                        </button>
                      ))}
                    </div>
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                      {(selectedCategory === 'All' ? items : items.filter(i => i.category === selectedCategory)).map(item => (
                        <div key={item.id} className="bg-white p-5 rounded-[2.5rem] border hover:shadow-xl transition-all group">
                          <div className="bg-slate-50 rounded-3xl h-44 flex items-center justify-center mb-4 overflow-hidden relative">
                            <img src={item.img} className="h-28 group-hover:scale-110 transition-transform duration-500" />
                          </div>
                          <div className="flex justify-between items-start mb-1">
                             <p className="text-[10px] font-black text-blue-500 uppercase">{item.category}</p>
                             <p className={`text-[10px] font-bold ${item.stock > 0 ? 'text-slate-400' : 'text-red-500'}`}>Kho: {item.stock}</p>
                          </div>
                          <h3 className="font-black text-sm text-slate-800 uppercase italic line-clamp-1">{item.name}</h3>
                          <p className="text-red-600 font-black text-xl tracking-tighter mt-1">{item.price.toLocaleString()}đ</p>
                          <button onClick={() => handleAddToCart(item)} className={`mt-4 w-full py-3 rounded-2xl font-black text-[10px] uppercase ${item.stock > 0 ? 'bg-slate-900 text-white hover:bg-blue-600' : 'bg-slate-200 text-slate-400'}`}>
                            {item.stock > 0 ? 'Thêm Vào Giỏ' : 'Hết Hàng'}
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Deposit View */}
                {activeTab === 'deposit' && (
                  <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in">
                    <div className="bg-white p-2 rounded-3xl shadow-sm border flex gap-2">
                      <button onClick={() => setDepositTab('bank')} className={`flex-1 py-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2 ${depositTab === 'bank' ? 'bg-slate-900 text-white shadow-xl' : 'text-slate-400'}`}><i className="fa-solid fa-money-bill-wave"></i> Chuyển Khoản</button>
                      <button onClick={() => setDepositTab('card')} className={`flex-1 py-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2 ${depositTab === 'card' ? 'bg-slate-900 text-white shadow-xl' : 'text-slate-400'}`}><i className="fa-solid fa-credit-card"></i> Thẻ Cào</button>
                    </div>
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border">
                      {depositTab === 'bank' ? (
                        <div className="grid md:grid-cols-2 gap-10">
                          <div className="space-y-6">
                            <h2 className="text-2xl font-black uppercase italic border-l-4 border-blue-600 pl-4">Quét Mã QR</h2>
                            <div className="bg-slate-50 p-4 rounded-3xl text-center border">
                              <img src={bankInfo.qrUrl} className="mx-auto rounded-xl w-64 shadow-md mb-4" />
                              <p className="font-black uppercase text-lg">{bankInfo.accountName}</p>
                              <p className="text-blue-600 font-black text-xl">{bankInfo.accountNumber}</p>
                              <p className="text-[10px] font-black text-slate-400 uppercase mt-1">{bankInfo.bankName}</p>
                            </div>
                          </div>
                          <form onSubmit={(e) => {
                             e.preventDefault();
                             if (!currentUser) return showNotify("Vui lòng đăng nhập!");
                             const req = { id: Date.now(), user: currentUser.username, value: parseInt(e.target.amount.value), status: 'pending', date: new Date().toLocaleString(), category: 'deposit', method: 'Chuyển khoản', receivedValue: parseInt(e.target.amount.value), note: e.target.note.value };
                             saveToCloud({ requests: [req, ...pendingRequests], history: [req, ...transactionHistory] });
                             showNotify("Đã gửi yêu cầu nạp!");
                             e.target.reset();
                          }} className="space-y-4">
                            <h3 className="font-black text-slate-400 uppercase text-xs tracking-widest">Gửi Yêu Cầu Duyệt Nạp</h3>
                            <input name="amount" type="number" required placeholder="Số tiền đã chuyển" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold" />
                            <input name="note" required placeholder="Nội dung chuyển khoản (Tên tài khoản)" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold" />
                            <button className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl">Xác Nhận Đã Chuyển</button>
                            <p className="text-[10px] text-center text-slate-400 font-bold italic uppercase leading-relaxed">Admin sẽ đối soát sao kê và cộng tiền cho bạn sau 1-5 phút.</p>
                          </form>
                        </div>
                      ) : (
                        <form onSubmit={(e) => {
                          e.preventDefault();
                          if (!currentUser) return showNotify("Vui lòng đăng nhập!");
                          const val = parseInt(e.target.value.value);
                          const req = { id: Date.now(), user: currentUser.username, value: val, status: 'pending', date: new Date().toLocaleString(), category: 'deposit', method: 'Thẻ cào', receivedValue: val * 0.85, code: e.target.code.value, serial: e.target.serial.value, type: e.target.type.value };
                          saveToCloud({ requests: [req, ...pendingRequests], history: [req, ...transactionHistory] });
                          showNotify("Yêu cầu nạp thẻ đã được gửi!");
                          e.target.reset();
                        }} className="max-w-xl mx-auto space-y-6">
                           <div className="p-4 bg-red-50 text-red-600 rounded-2xl text-[10px] font-black text-center border uppercase tracking-widest">🚨 CHIẾT KHẤU THẺ CÀO: 15% (THUẾ)</div>
                           <div className="grid grid-cols-2 gap-4">
                              <select name="type" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold"><option>Viettel</option><option>Mobifone</option><option>Vinaphone</option><option>Zing</option></select>
                              <select name="value" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold"><option value="10000">10,000đ</option><option value="50000">50,000đ</option><option value="100000">100,000đ</option><option value="500000">500,000đ</option></select>
                           </div>
                           <input name="serial" placeholder="Số Seri thẻ" required className="w-full p-4 bg-slate-50 border rounded-2xl" />
                           <input name="code" placeholder="Mã Thẻ (sau lớp cào)" required className="w-full p-4 bg-slate-50 border rounded-2xl" />
                           <button className="w-full py-4 bg-slate-900 text-white font-black rounded-2xl uppercase tracking-widest shadow-xl">Gửi Thẻ Chờ Duyệt</button>
                        </form>
                      )}
                    </div>
                  </div>
                )}

                {/* Admin View */}
                {activeTab === 'admin' && currentUser?.role === 'admin' && (
                  <div className="space-y-8 animate-in fade-in pb-20">
                     <div className="bg-slate-900 text-white p-8 rounded-[2rem] flex justify-between items-center shadow-2xl">
                        <div><h2 className="text-3xl font-black italic uppercase">Bảng Điều Khiển Admin</h2><p className="text-slate-400">Có {pendingRequests.length} đơn chờ bạn xử lý</p></div>
                        <div className="text-center bg-white/10 p-4 rounded-2xl backdrop-blur-md"><p className="text-[10px] text-blue-400 font-black">CHỜ XỬ LÝ</p><p className="text-3xl font-black">{pendingRequests.length}</p></div>
                     </div>
                     
                     <div className="grid lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 space-y-8">
                           {/* Pending Req */}
                           <div className="bg-white p-8 rounded-[2rem] border shadow-sm">
                              <h3 className="font-black text-xs uppercase text-slate-400 mb-6 flex items-center gap-2"><i className="fa-solid fa-clock"></i> Đơn hàng & Nạp tiền mới</h3>
                              <div className="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                                 {pendingRequests.map(req => (
                                   <div key={req.id} className="p-5 bg-slate-50 rounded-3xl border flex flex-col sm:flex-row justify-between items-center gap-4">
                                      <div className="flex gap-4 items-center">
                                         <div className={`w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0 ${req.category === 'deposit' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-blue-600'}`}><i className={`fa-solid ${req.category === 'deposit' ? 'fa-wallet' : 'fa-cart-shopping'}`}></i></div>
                                         <div>
                                            <p className="font-black text-slate-800 text-xs uppercase">{req.user} - {req.method || 'Đơn hàng'}</p>
                                            <p className="text-red-600 font-black text-sm">{(req.receivedValue || req.total || req.value).toLocaleString()}đ</p>
                                            {req.robloxUser && <p className="text-[9px] font-black text-blue-500 uppercase bg-blue-50 px-2 py-1 rounded inline-block mt-1">ROBLOX: {req.robloxUser}</p>}
                                            {req.code && <p className="text-[9px] font-black text-emerald-600 uppercase bg-emerald-50 px-2 py-1 rounded block mt-1">Mã: {req.code} | Seri: {req.serial}</p>}
                                         </div>
                                      </div>
                                      <div className="flex gap-2 w-full sm:w-auto">
                                         <button onClick={() => handleApprove(req.id)} className="flex-1 sm:flex-none px-4 py-2 bg-emerald-500 text-white rounded-xl text-[10px] font-black uppercase shadow-lg shadow-emerald-100">Duyệt</button>
                                         <button onClick={() => handleReject(req.id)} className="flex-1 sm:flex-none px-4 py-2 bg-red-500 text-white rounded-xl text-[10px] font-black uppercase shadow-lg shadow-red-100">Hủy</button>
                                      </div>
                                   </div>
                                 ))}
                                 {pendingRequests.length === 0 && <p className="text-center text-slate-400 italic py-20 font-bold uppercase text-[10px]">Tất cả yêu cầu đã được xử lý sạch sẽ!</p>}
                              </div>
                           </div>

                           {/* Inventory */}
                           <div className="bg-white p-8 rounded-[2rem] border shadow-sm">
                              <h3 className="font-black text-xs text-slate-400 mb-6 uppercase flex items-center gap-2"><i className="fa-solid fa-pen-to-square"></i> Quản lý Kho Hàng & Giá</h3>
                              <div className="space-y-4 max-h-[400px] overflow-y-auto custom-scrollbar pr-2">
                                 {items.map(it => (
                                    <div key={it.id} className="p-4 bg-slate-50 border rounded-2xl flex items-center gap-4 group">
                                       <img src={it.img} className="w-12 h-12 rounded-xl bg-white border p-1" />
                                       <div className="flex-grow">
                                          <p className="text-[10px] font-black uppercase text-blue-600 mb-1">{it.category}</p>
                                          <p className="text-xs font-black uppercase text-slate-800">{it.name}</p>
                                          <div className="flex gap-2 mt-2">
                                             <div className="flex-1"><label className="text-[8px] font-bold uppercase text-slate-400 block ml-1 mb-0.5">Giá</label><input type="number" value={it.price} onChange={e => saveToCloud({ items: items.map(x => x.id === it.id ? {...x, price: parseInt(e.target.value) || 0} : x) })} className="w-full p-2 text-xs font-bold border rounded-lg" /></div>
                                             <div className="flex-1"><label className="text-[8px] font-bold uppercase text-slate-400 block ml-1 mb-0.5">Kho</label><input type="number" value={it.stock} onChange={e => saveToCloud({ items: items.map(x => x.id === it.id ? {...x, stock: parseInt(e.target.value) || 0} : x) })} className="w-full p-2 text-xs font-bold border rounded-lg" /></div>
                                          </div>
                                       </div>
                                       <button onClick={() => saveToCloud({ items: items.filter(x => x.id !== it.id) })} className="p-3 text-slate-300 hover:text-red-500 transition-colors"><i className="fa-solid fa-trash"></i></button>
                                    </div>
                                 ))}
                              </div>
                           </div>
                        </div>

                        <div className="space-y-8">
                           {/* Cộng tiền khách */}
                           <div className="bg-white p-8 rounded-[2rem] border shadow-sm">
                              <h3 className="font-black text-xs text-slate-400 mb-6 uppercase">Cộng tiền cho thành viên</h3>
                              <div className="space-y-4">
                                 <input placeholder="Tên tài khoản (Chính xác)" value={targetUser} onChange={e => setTargetUser(e.target.value)} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm" />
                                 <input type="number" placeholder="Số tiền cộng (VNĐ)" value={adjustAmount} onChange={e => setAdjustAmount(e.target.value)} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm" />
                                 <button onClick={() => {
                                   const amount = parseInt(adjustAmount);
                                   const uIndex = registeredUsers.findIndex(x => x.username === targetUser);
                                   if (uIndex === -1) return showNotify("Không tìm thấy user!");
                                   const updated = [...registeredUsers];
                                   updated[uIndex].balance += amount;
                                   const historyLog = { id: Date.now(), user: targetUser, category: 'deposit', method: 'Admin Cộng', value: amount, receivedValue: amount, status: 'approved', date: new Date().toLocaleString() };
                                   saveToCloud({ users: updated, history: [historyLog, ...transactionHistory] });
                                   showNotify(`Đã cộng ${amount.toLocaleString()}đ cho ${targetUser}`);
                                   setTargetUser(''); setAdjustAmount('');
                                 }} className="w-full py-4 bg-emerald-500 text-white font-black rounded-2xl text-xs uppercase tracking-widest shadow-xl shadow-emerald-100">Xác Nhận Cộng Tiền</button>
                              </div>
                           </div>

                           {/* Cài đặt shop */}
                           <div className="bg-white p-8 rounded-[2rem] border shadow-sm space-y-6">
                              <h3 className="font-black text-xs text-slate-400 uppercase">Cài Đặt Hệ Thống Shop</h3>
                              <div className="space-y-4">
                                 <div><label className="text-[10px] font-black uppercase text-slate-400 ml-1">Link Ảnh Mã QR</label><input value={bankInfo.qrUrl} onChange={e => setBankInfo({...bankInfo, qrUrl: e.target.value})} className="w-full p-3 text-xs border rounded-xl" /></div>
                                 <div><label className="text-[10px] font-black uppercase text-slate-400 ml-1">Tên Chủ TK</label><input value={bankInfo.accountName} onChange={e => setBankInfo({...bankInfo, accountName: e.target.value})} className="w-full p-3 text-xs border rounded-xl" /></div>
                                 <div><label className="text-[10px] font-black uppercase text-slate-400 ml-1">Số TK & Bank</label><input value={bankInfo.accountNumber} onChange={e => setBankInfo({...bankInfo, accountNumber: e.target.value})} className="w-full p-3 text-xs border rounded-xl" /></div>
                                 <div><label className="text-[10px] font-black uppercase text-slate-400 ml-1">Tiêu Đề Banner</label><textarea value={bannerInfo.title} onChange={e => setBannerInfo({...bannerInfo, title: e.target.value})} rows="2" className="w-full p-3 text-xs border rounded-xl resize-none"></textarea></div>
                              </div>
                              <button onClick={() => {
                                saveToCloud({ bank: bankInfo, banner: bannerInfo, msg: checkoutMessage });
                                showNotify("Đã lưu cài đặt lên Cloud!");
                              }} className="w-full py-4 bg-slate-900 text-white font-black text-[10px] uppercase rounded-2xl shadow-xl">Lưu Cấu Hình</button>
                           </div>

                           {/* Đăng vật phẩm mới */}
                           <div className="bg-white p-8 rounded-[2rem] border shadow-sm">
                              <h3 className="font-black text-xs text-slate-400 uppercase mb-4">Đăng sản phẩm mới</h3>
                              <form onSubmit={e => {
                                 e.preventDefault();
                                 const p = { id: Date.now(), name: newItem.name, price: parseInt(newItem.price), stock: parseInt(newItem.stock), category: newItem.category, img: `https://api.dicebear.com/7.x/shapes/svg?seed=${newItem.name}` };
                                 saveToCloud({ items: [p, ...items] });
                                 setNewItem({ name: '', price: '', stock: '', category: 'Sword' });
                                 showNotify("Đã đăng món mới!");
                              }} className="space-y-4">
                                 <input value={newItem.name} onChange={e=>setNewItem({...newItem, name: e.target.value})} placeholder="Tên vật phẩm" className="w-full p-3 text-xs border rounded-xl" required />
                                 <input type="number" value={newItem.price} onChange={e=>setNewItem({...newItem, price: e.target.value})} placeholder="Giá bán (VNĐ)" className="w-full p-3 text-xs border rounded-xl" required />
                                 <input type="number" value={newItem.stock} onChange={e=>setNewItem({...newItem, stock: e.target.value})} placeholder="Số lượng kho" className="w-full p-3 text-xs border rounded-xl" required />
                                 <select value={newItem.category} onChange={e=>setNewItem({...newItem, category: e.target.value})} className="w-full p-3 text-xs border rounded-xl font-bold"><option>Sword</option><option>Melee</option><option>Item</option><option>Gamepass</option></select>
                                 <button className="w-full py-4 bg-blue-600 text-white font-black uppercase text-[10px] rounded-2xl shadow-xl shadow-blue-100">Đăng Lên Cửa Hàng</button>
                              </form>
                           </div>
                        </div>
                     </div>
                  </div>
                )}

                {/* History View */}
                {activeTab === 'history' && (
                  <div className="max-w-4xl mx-auto space-y-8 pb-20 animate-in fade-in">
                     <h2 className="text-2xl font-black uppercase italic border-l-4 border-blue-600 pl-4">Lịch Sử Giao Dịch</h2>
                     <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm">
                        <table className="w-full text-left">
                          <thead className="bg-slate-50 text-[9px] font-black text-slate-400 uppercase border-b">
                            <tr><th className="px-6 py-5">Thời Gian</th><th className="px-6 py-5">Chi Tiết Đơn</th><th className="px-6 py-5 text-center">Trạng Thái</th></tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {transactionHistory.filter(h => h.user === currentUser?.username || currentUser?.role === 'admin').map(h => (
                              <tr key={h.id} className="text-xs hover:bg-slate-50 transition-colors">
                                <td className="px-6 py-5 text-slate-500 font-bold">{h.date}</td>
                                <td className="px-6 py-5">
                                  <p className="font-black uppercase text-slate-800">{h.category === 'deposit' ? `Nạp Tiền: ${h.method}` : `Mua Hàng (${h.items?.length || 0} món)`}</p>
                                  <p className="text-red-600 font-black">{(h.receivedValue || h.total || h.value).toLocaleString()}đ</p>
                                  {h.robloxUser && <p className="text-[9px] font-black text-blue-500 uppercase mt-1">ID: {h.robloxUser}</p>}
                                </td>
                                <td className="px-6 py-5 text-center">
                                  <span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest ${h.status === 'pending' ? 'bg-orange-100 text-orange-600' : h.status === 'completed' || h.status === 'approved' ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}`}>
                                    {h.status === 'pending' ? 'Đang chờ' : h.status === 'completed' || h.status === 'approved' ? 'Xong' : 'Hủy'}
                                  </span>
                                </td>
                              </tr>
                            ))}
                            {transactionHistory.length === 0 && <tr><td colSpan="3" className="py-20 text-center text-slate-400 italic font-bold">Chưa có giao dịch nào được thực hiện.</td></tr>}
                          </tbody>
                        </table>
                     </div>
                  </div>
                )}
              </main>

              {/* Cart Drawer */}
              {isCartOpen && (
                <div className="fixed inset-0 z-[100] flex justify-end">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onClick={() => setIsCartOpen(false)}></div>
                  <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-in slide-in-from-right duration-300">
                     <div className="p-8 border-b bg-slate-900 text-white flex justify-between items-center">
                        <h2 className="font-black uppercase italic text-xl flex items-center gap-2"><i className="fa-solid fa-cart-shopping"></i> Giỏ Hàng</h2>
                        <button onClick={() => setIsCartOpen(false)} className="bg-white/10 p-2 w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/20"><i className="fa-solid fa-xmark"></i></button>
                     </div>
                     <div className="flex-grow overflow-y-auto p-6 space-y-4 custom-scrollbar">
                        {cart.map(i => (
                          <div key={i.id} className="bg-slate-50 p-4 rounded-3xl border border-slate-100">
                            <div className="flex gap-4">
                               <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center p-2 shadow-sm border"><img src={i.img} className="w-full h-full object-contain" /></div>
                               <div className="flex-grow">
                                 <p className="text-xs font-black uppercase italic text-slate-800 line-clamp-1">{i.name}</p>
                                 <div className="flex justify-between items-center mt-2">
                                    <div className="flex items-center bg-white rounded-lg border overflow-hidden shadow-sm">
                                       <button onClick={() => setCart(cart.map(x => x.id === i.id ? {...x, qty: Math.max(0, x.qty - 1)} : x).filter(x => x.qty > 0))} className="w-8 h-8 flex items-center justify-center bg-slate-50 hover:bg-slate-100 text-slate-600 font-bold">-</button>
                                       <span className="w-8 text-center text-xs font-black">{i.qty}</span>
                                       <button onClick={() => {
                                         const dbItem = items.find(x => x.id === i.id);
                                         if (i.qty < dbItem.stock) setCart(cart.map(x => x.id === i.id ? {...x, qty: x.qty + 1} : x));
                                         else showNotify("Đã hết hàng trong kho!");
                                       }} className="w-8 h-8 flex items-center justify-center bg-slate-50 hover:bg-slate-100 text-slate-600 font-bold">+</button>
                                    </div>
                                    <p className="text-sm font-black text-red-600">{(i.price * i.qty).toLocaleString()}đ</p>
                                 </div>
                               </div>
                            </div>
                          </div>
                        ))}
                        {cart.length === 0 && <div className="h-full flex flex-col items-center justify-center opacity-30 text-slate-400"><i className="fa-solid fa-cart-shopping text-[60px] mb-4"></i><p className="font-bold uppercase text-xs tracking-widest">Giỏ hàng đang trống</p></div>}
                     </div>
                     {cart.length > 0 && (
                       <div className="p-8 border-t bg-white shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
                          <div className="bg-blue-50 p-5 rounded-3xl mb-6 border border-blue-100">
                            <label className="text-[10px] font-black text-blue-800 uppercase mb-2 block tracking-widest">Tài khoản Roblox Nhận Đồ</label>
                            <input value={robloxUsername} onChange={e=>setRobloxUsername(e.target.value)} placeholder="Nhập tên đăng nhập Roblox..." className="w-full p-4 bg-white border border-blue-200 rounded-2xl font-bold shadow-sm outline-none focus:ring-2 focus:ring-blue-400" />
                          </div>
                          <div className="flex justify-between items-end mb-6">
                             <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tổng thanh toán</span>
                             <span className="text-3xl font-black text-red-600 tracking-tighter">{(cart.reduce((s,i)=>s+i.price*i.qty,0)).toLocaleString()}đ</span>
                          </div>
                          <button onClick={checkout} disabled={!currentUser} className="w-full py-5 bg-blue-600 text-white font-black rounded-2xl uppercase shadow-xl shadow-blue-200 disabled:bg-slate-300 transition-all active:scale-[0.98]">
                            {!currentUser ? 'ĐĂNG NHẬP ĐỂ THANH TOÁN' : 'XÁC NHẬN MUA NGAY'}
                          </button>
                       </div>
                     )}
                  </div>
                </div>
              )}

              {/* Footer */}
              <footer className="bg-slate-900 text-white mt-10 pt-16 pb-8 px-4 border-t-4 border-blue-600">
                <div className="max-w-7xl mx-auto grid md:grid-cols-3 gap-12 border-b border-white/10 pb-12">
                  <div className="space-y-6">
                    <div className="flex items-center gap-2"><div className="bg-blue-600 p-2.5 rounded-xl"><i className="fa-solid fa-anchor text-[24px]"></i></div><span className="text-3xl font-black uppercase italic tracking-tighter">Sailor<span className="text-blue-500">Shop</span></span></div>
                    <p className="text-slate-400 text-sm font-medium leading-relaxed">Hệ thống phân phối vật phẩm game uy tín, an toàn và chuyên nghiệp. Cam kết giao hàng nhanh chóng trực tiếp qua Roblox ID.</p>
                  </div>
                  <div className="space-y-6">
                    <h4 className="font-black uppercase italic text-blue-500 text-sm tracking-widest">Hỗ Trợ Khách Hàng</h4>
                    <a href={FANPAGE_URL} target="_blank" className="flex items-center gap-4 bg-white/5 p-4 rounded-2xl hover:bg-white/10 transition-colors border border-white/5">
                      <div className="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-lg"><i className="fa-brands fa-facebook-messenger text-[22px]"></i></div>
