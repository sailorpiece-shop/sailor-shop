<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailor Piece Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // BỘ KHUNG ÉP LƯU TRỮ TỨC THÌ (Khắc phục 100% lỗi mất dữ liệu)
        const useLocalStorageState = (key, initialValue) => {
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem(key);
                if (saved) {
                    try { return JSON.parse(saved); } catch (e) { return initialValue; }
                }
                return initialValue;
            });

            const setValue = (value) => {
                setState(value);
                if (value === null || value === undefined) {
                    localStorage.removeItem(key);
                } else {
                    localStorage.setItem(key, JSON.stringify(value));
                }
            };

            return [state, setValue];
        };

        const App = () => {
          const [activeTab, setActiveTab] = useState('home');
          const [isCartOpen, setIsCartOpen] = useState(false);
          const [notification, setNotification] = useState(null);
          
          const [authMode, setAuthMode] = useState('login'); 
          const [authForm, setAuthForm] = useState({ username: '', password: '', confirmPassword: '' });

          // --- STATE ĐÃ TÍCH HỢP BỘ LƯU TRỮ TỨC THÌ ---
          const [user, setUser] = useLocalStorageState('sp_user', null);
          const [registeredUsers, setRegisteredUsers] = useLocalStorageState('sp_users', []);
          
          const defaultItems = [
            { id: 1, name: "Trái Ác Quỷ: Mochi Mochi", category: "Item", price: 50000, stock: 10, img: "https://api.dicebear.com/7.x/shapes/svg?seed=mochi", desc: "Hệ Paramecia đặc biệt cực mạnh." },
            { id: 2, name: "Thanh Kiếm: Yoru", category: "Sword", price: 150000, stock: 5, img: "https://api.dicebear.com/7.x/shapes/svg?seed=yoru", desc: "Thanh kiếm của Mắt Diều Hâu." },
            { id: 3, name: "Gói 1,000,000 Beli", category: "Item", price: 20000, stock: 999, img: "https://api.dicebear.com/7.x/shapes/svg?seed=beli", desc: "Tiền tệ cơ bản trong game." },
            { id: 4, name: "Haki Quan Sát V2", category: "Gamepass", price: 250000, stock: 2, img: "https://api.dicebear.com/7.x/shapes/svg?seed=haki", desc: "Nâng cấp khả năng né tránh." },
          ];
          const [items, setItems] = useLocalStorageState('sp_items', defaultItems);
          
          const [pendingRequests, setPendingRequests] = useLocalStorageState('sp_pending', []); 
          const [transactionHistory, setTransactionHistory] = useLocalStorageState('sp_history', []);
          const [cart, setCart] = useLocalStorageState('sp_cart', []);

          // Các State Tùy chỉnh Admin (Lưu tức thì)
          const [checkoutMessage, setCheckoutMessage] = useLocalStorageState('sp_msg', "Cảm ơn bạn đã đặt hàng thành công!\n\nVui lòng nhắn tin cho Admin qua Fanpage kèm theo [Tên tài khoản Roblox] để được giao đồ vào game nhanh nhất nhé!");
          const [bannerInfo, setBannerInfo] = useLocalStorageState('sp_banner', {
            title: "CHINH PHỤC \n ĐẠI HẢI TRÌNH",
            subtitle: "Hệ thống phân phối vật phẩm Sailor Piece chuyên nghiệp. Giao đồ nhanh qua Roblox ID của bạn."
          });
          const [bankInfo, setBankInfo] = useLocalStorageState('sp_bank_info', {
            qrUrl: "https://raw.githubusercontent.com/yewan-shop/assets/main/qr_mb.jpg",
            accountName: "DO KHANH HUNG",
            accountNumber: "0385921454",
            bankName: "NGÂN HÀNG QUÂN ĐỘI (MB BANK)"
          });

          // Các State dùng tạm thời giao diện (Không cần lưu)
          const [robloxUsername, setRobloxUsername] = useState('');
          const [newItem, setNewItem] = useState({ name: '', price: '', stock: '', category: 'Sword', desc: '' });
          const [depositTab, setDepositTab] = useState('bank');
          const [targetUser, setTargetUser] = useState('');
          const [showUserDropdown, setShowUserDropdown] = useState(false);
          const [adjustAmount, setAdjustAmount] = useState('');
          const [selectedCategory, setSelectedCategory] = useState('All');
          const [selectedCardValue, setSelectedCardValue] = useState(10000);
          const [showCheckoutSuccess, setShowCheckoutSuccess] = useState(false);

          const FANPAGE_URL = "https://www.facebook.com/share/17KdJjb5XM/";

          const showNotify = (msg) => {
            setNotification(msg);
            setTimeout(() => setNotification(null), 4000);
          };

          // --- Logic Auth ---
          const handleAuth = (e) => {
            e.preventDefault();
            if (authMode === 'register') {
              if (authForm.password !== authForm.confirmPassword) return showNotify("Mật khẩu không khớp!");
              if (registeredUsers.find(u => u.username === authForm.username)) return showNotify("Tài khoản đã tồn tại!");
              const newUser = { username: authForm.username, password: authForm.password, balance: 0, role: 'user' };
              setRegisteredUsers([...registeredUsers, newUser]);
              showNotify("Đăng ký thành công! Hãy đăng nhập.");
              setAuthMode('login');
              setAuthForm({ username: '', password: '', confirmPassword: '' });
            } else {
              if (authForm.username === 'Yewan' && authForm.password === 'Botditcogiao113!') {
                setUser({ name: 'Yewan', balance: 999999999, role: 'admin' });
                showNotify("Chào Admin Yewan! Đã mở quyền quản trị.");
                setActiveTab('admin');
              } else {
                const found = registeredUsers.find(u => u.username === authForm.username && u.password === authForm.password);
                if (found) {
                  setUser(found);
                  showNotify(`Chào mừng ${found.username}!`);
                  setActiveTab('home');
                } else {
                  showNotify("Sai tài khoản hoặc mật khẩu!");
                }
              }
            }
          };

          // --- Logic Nạp Tiền ---
          const submitDeposit = (e) => {
            e.preventDefault();
            if (!user) return showNotify("Vui lòng đăng nhập!");
            
            let depositData = {
              id: Date.now(),
              user: user.name,
              status: 'pending',
              date: new Date().toLocaleString(),
              category: 'deposit',
              method: depositTab === 'card' ? 'Thẻ cào' : 'Chuyển khoản'
            };

            if (depositTab === 'card') {
              const cardValue = parseInt(e.target.value.value);
              depositData = { 
                ...depositData, 
                type: e.target.type.value, 
                value: cardValue, 
                receivedValue: cardValue * 0.85, 
                code: e.target.code.value, 
                serial: e.target.serial.value 
              };
            } else {
              const bankValue = parseInt(e.target.amount.value);
              depositData = { 
                ...depositData, 
                value: bankValue, 
                receivedValue: bankValue, 
                note: e.target.note.value 
              };
            }
            
            setPendingRequests([depositData, ...pendingRequests]);
            setTransactionHistory([depositData, ...transactionHistory]);
            showNotify("Đã gửi yêu cầu! Admin sẽ duyệt sau ít phút.");
            if (e.target.reset) e.target.reset();
          };

          // --- Logic Giỏ Hàng & Số Lượng ---
          const handleAddToCart = (item) => {
            if (item.stock <= 0) return showNotify("Sản phẩm này hiện đã hết hàng!");
            
            const existing = cart.find(i => i.id === item.id);
            if (existing && existing.qty >= item.stock) {
              return showNotify(`Kho chỉ còn ${item.stock} sản phẩm!`);
            }

            if (existing) {
              setCart(cart.map(i => i.id === item.id ? {...i, qty: i.qty + 1} : i));
            } else {
              setCart([...cart, {...item, qty: 1}]);
            }
            showNotify("Đã thêm vào giỏ hàng!");
          };

          const updateCartQty = (id, delta) => {
            const itemInCart = cart.find(i => i.id === id);
            const itemInDb = items.find(i => i.id === id);
            if (!itemInCart || !itemInDb) return;

            const newQty = itemInCart.qty + delta;
            if (newQty <= 0) {
              setCart(cart.filter(i => i.id !== id));
            } else if (newQty > itemInDb.stock) {
              showNotify(`Sản phẩm này chỉ còn ${itemInDb.stock} chiếc trong kho!`);
            } else {
              setCart(cart.map(i => i.id === id ? {...i, qty: newQty} : i));
            }
          };

          // --- Logic Mua Hàng ---
          const checkout = () => {
            if (!robloxUsername) return showNotify("Vui lòng nhập tên tài khoản Roblox!");
            const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
            if (user.balance < total) return showNotify("Số dư không đủ! Hãy nạp thêm tiền.");
            
            const orderData = {
              id: Date.now(),
              user: user.name,
              robloxUser: robloxUsername,
              items: [...cart],
              total: total,
              status: 'pending',
              date: new Date().toLocaleString(),
              category: 'order'
            };

            setPendingRequests([orderData, ...pendingRequests]);
            setTransactionHistory([orderData, ...transactionHistory]);
            
            // Cập nhật số dư cho session hiện tại VÀ trong danh sách user
            const updatedBalance = user.balance - total;
            setUser({...user, balance: updatedBalance});
            
            const userIndex = registeredUsers.findIndex(u => u.username === user.name);
            if(userIndex !== -1) {
               const updatedUsers = [...registeredUsers];
               updatedUsers[userIndex].balance = updatedBalance;
               setRegisteredUsers(updatedUsers);
            }
            
            const updatedItems = items.map(item => {
              const purchased = cart.find(c => c.id === item.id);
              if (purchased) {
                return { ...item, stock: item.stock - purchased.qty };
              }
              return item;
            });
            setItems(updatedItems);

            setCart([]);
            setIsCartOpen(false);
            setShowCheckoutSuccess(true);
          };

          // --- LOGIC PHÊ DUYỆT / TỪ CHỐI BỞI ADMIN ---
          const handleApprove = (reqId) => {
            const req = pendingRequests.find(r => r.id === reqId);
            if (!req) return;

            if (req.category === 'deposit') {
              const userIndex = registeredUsers.findIndex(u => u.username === req.user);
              if (userIndex !== -1) {
                 const updatedUsers = [...registeredUsers];
                 updatedUsers[userIndex].balance += req.receivedValue;
                 setRegisteredUsers(updatedUsers);
              }
              if (user && user.name === req.user) setUser({...user, balance: user.balance + req.receivedValue});
              showNotify(`Đã duyệt +${req.receivedValue.toLocaleString()}đ cho ${req.user}`);
            } else {
              showNotify(`Đã giao đơn hàng thành công cho tài khoản Roblox: ${req.robloxUser}`);
            }
            
            setTransactionHistory(transactionHistory.map(h => h.id === reqId ? {...h, status: req.category === 'deposit' ? 'approved' : 'completed'} : h));
            setPendingRequests(pendingRequests.filter(r => r.id !== reqId));
          };

          const handleReject = (reqId) => {
            const req = pendingRequests.find(r => r.id === reqId);
            if (!req) return;

            if (req.category === 'order') {
              // Hoàn tiền cho người dùng nếu đơn hàng bị hủy
              const userIndex = registeredUsers.findIndex(u => u.username === req.user);
              if (userIndex !== -1) {
                 const updatedUsers = [...registeredUsers];
                 updatedUsers[userIndex].balance += req.total;
                 setRegisteredUsers(updatedUsers);
              }
              if (user && user.name === req.user) setUser({...user, balance: user.balance + req.total});
              
              // Trả lại số lượng sản phẩm vào kho
              const updatedItems = items.map(item => {
                 const purchased = req.items.find(c => c.id === item.id);
                 if (purchased) {
                    return { ...item, stock: item.stock + purchased.qty };
                 }
                 return item;
              });
              setItems(updatedItems);

              showNotify(`Đã báo không thành công! Đã hoàn lại ${req.total.toLocaleString()}đ cho ${req.user}`);
            } else {
              showNotify(`Đã từ chối yêu cầu nạp tiền của ${req.user}`);
            }

            setTransactionHistory(transactionHistory.map(h => h.id === reqId ? {...h, status: 'rejected'} : h));
            setPendingRequests(pendingRequests.filter(r => r.id !== reqId));
          };

          const handleManualAddBalance = (e) => {
            e.preventDefault();
            if (!targetUser || !adjustAmount) return showNotify("Vui lòng nhập đầy đủ thông tin!");

            const amount = parseInt(adjustAmount);
            if (isNaN(amount) || amount <= 0) return showNotify("Số tiền không hợp lệ!");

            const userIndex = registeredUsers.findIndex(u => u.username === targetUser);

            if (userIndex === -1) {
               return showNotify("Không tìm thấy tài khoản này trong hệ thống!");
            }

            const updatedUsers = [...registeredUsers];
            updatedUsers[userIndex].balance += amount;
            setRegisteredUsers(updatedUsers);
            
            // Cập nhật session admin nếu admin tự cộng cho chính mình (để test)
            if (user && user.name === targetUser) {
                setUser({...user, balance: user.balance + amount});
            }

            const transData = {
              id: Date.now(),
              user: targetUser,
              category: 'deposit',
              method: 'Admin Cộng Tiền',
              value: amount,
              receivedValue: amount,
              status: 'approved',
              date: new Date().toLocaleString()
            };
            setTransactionHistory([transData, ...transactionHistory]);

            showNotify(`Đã cộng thành công ${amount.toLocaleString()}đ cho tài khoản ${targetUser}!`);
            setTargetUser(''); 
            setAdjustAmount(''); 
          };

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans selection:bg-blue-100 pb-10">
              {/* Messenger Bubble */}
              <a 
                href={FANPAGE_URL}
                target="_blank" 
                rel="noreferrer"
                className="fixed bottom-6 right-6 z-[90] bg-blue-600 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform flex items-center justify-center animate-bounce"
              >
                <i className="fa-brands fa-facebook-messenger text-[28px]"></i>
              </a>

              {/* Popup Thanh Toán Thành Công */}
              {showCheckoutSuccess && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
                   <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onClick={() => setShowCheckoutSuccess(false)}></div>
                   <div className="relative bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl animate-in zoom-in-95 duration-300 border border-slate-100">
                      <div className="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                         <i className="fa-solid fa-circle-check text-[40px]"></i>
                      </div>
                      <h3 className="text-2xl font-black text-center uppercase italic text-slate-800 mb-2">Đặt Hàng Thành Công!</h3>
                      <p className="text-center text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Roblox ID: {robloxUsername}</p>
                      
                      <div className="bg-blue-50/50 p-5 rounded-3xl border border-blue-100 mb-8 text-sm font-bold text-slate-700 leading-relaxed whitespace-pre-wrap text-center">
                         {checkoutMessage}
                      </div>
                      
                      <div className="space-y-3">
                         <a 
                            href={FANPAGE_URL} 
                            target="_blank" 
                            rel="noreferrer" 
                            onClick={() => setShowCheckoutSuccess(false)}
                            className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest flex items-center justify-center gap-2 hover:bg-blue-700 transition-colors shadow-xl shadow-blue-100"
                         >
                            <i className="fa-brands fa-facebook-messenger text-[18px]"></i> Chat Với Fanpage Ngay
                         </a>
                         <button 
                            onClick={() => setShowCheckoutSuccess(false)} 
                            className="w-full py-4 bg-slate-100 text-slate-500 font-black rounded-2xl uppercase text-xs tracking-widest hover:bg-slate-200 transition-colors"
                         >
                            Đóng lại
                         </button>
                      </div>
                   </div>
                </div>
              )}

              {/* Toast Notification */}
              {notification && (
                <div className="fixed top-20 right-4 z-[120] bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border-l-4 border-blue-500 animate-in slide-in-from-right-full">
                  <i className="fa-solid fa-bolt text-yellow-400 text-[16px]"></i>
                  <p className="text-sm font-bold">{notification}</p>
                </div>
              )}

              {/* Header */}
              <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-slate-100">
                <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveTab('home')}>
                    <div className="bg-blue-600 text-white p-2 rounded-xl shadow-lg shadow-blue-200 flex items-center justify-center w-9 h-9">
                      <i className="fa-solid fa-anchor text-[16px]"></i>
                    </div>
                    <span className="text-lg font-black uppercase italic tracking-tighter">Sailor<span className="text-blue-600">Shop</span></span>
                  </div>

                  <nav className="hidden md:flex items-center gap-6 font-black text-[10px] uppercase tracking-widest text-slate-400">
                    <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-blue-600' : 'hover:text-slate-900'}>Trang Chủ</button>
                    <button onClick={() => setActiveTab('shop')} className={activeTab === 'shop' ? 'text-blue-600' : 'hover:text-slate-900'}>Sản Phẩm</button>
                    <button onClick={() => setActiveTab('deposit')} className={activeTab === 'deposit' ? 'text-blue-600' : 'hover:text-slate-900'}>Nạp Tiền</button>
                    {user && <button onClick={() => setActiveTab('history')} className={activeTab === 'history' ? 'text-blue-600' : 'hover:text-slate-900'}>Lịch Sử</button>}
                    {user?.role === 'admin' && <button onClick={() => setActiveTab('admin')} className="text-orange-500 flex items-center gap-1.5"><i className="fa-solid fa-gear text-[14px]"></i> QUẢN TRỊ</button>}
                  </nav>

                  <div className="flex items-center gap-3">
                    {user ? (
                      <div className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-2xl border border-slate-200">
                        <div className="text-right hidden sm:block">
                          <p className="text-[8px] font-black text-slate-400 leading-none">VÍ SHOP</p>
                          <p className="text-xs font-black text-emerald-600">{user.balance.toLocaleString()}đ</p>
                        </div>
                        <button onClick={() => {setUser(null); setActiveTab('home');}} className="ml-2 text-slate-400 hover:text-red-600 transition-colors"><i className="fa-solid fa-right-from-bracket text-[16px]"></i></button>
                      </div>
                    ) : (
                      <button onClick={() => {setAuthMode('login'); setActiveTab('auth');}} className="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 transition-colors">Đăng Nhập</button>
                    )}
                    <button onClick={() => setIsCartOpen(true)} className="relative p-2.5 bg-slate-100 rounded-2xl hover:bg-slate-200 transition-colors flex items-center justify-center">
                      <i className="fa-solid fa-cart-shopping text-[16px]"></i>
                      {cart.length > 0 && <span className="absolute -top-1.5 -right-1.5 bg-red-600 text-white text-[9px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">{cart.length}</span>}
                    </button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-4 py-8">
                {/* Auth */}
                {activeTab === 'auth' && (
                  <div className="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-50 mt-10">
                    <div className="flex gap-4 mb-8">
                      <button onClick={() => setAuthMode('login')} className={`flex-1 py-3 font-black text-[10px] uppercase rounded-2xl transition-all ${authMode === 'login' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-400'}`}>Đăng Nhập</button>
                      <button onClick={() => setAuthMode('register')} className={`flex-1 py-3 font-black text-[10px] uppercase rounded-2xl transition-all ${authMode === 'register' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-400'}`}>Đăng Ký</button>
                    </div>
                    <form onSubmit={handleAuth} className="space-y-4">
                      <input type="text" placeholder="Tên tài khoản" required value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" />
                      <input type="password" placeholder="Mật khẩu" required value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" />
                      {authMode === 'register' && <input type="password" placeholder="Xác nhận mật khẩu" required value={authForm.confirmPassword} onChange={e => setAuthForm({...authForm, confirmPassword: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" />}
                      <button className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest">{authMode === 'login' ? 'Đăng Nhập' : 'Đăng Ký'}</button>
                    </form>
                  </div>
                )}

                {/* Home */}
                {activeTab === 'home' && (
                  <div className="space-y-12">
                    <div className="bg-gradient-to-br from-blue-700 to-indigo-900 rounded-[3rem] p-12 text-white relative overflow-hidden shadow-2xl">
                      <div className="relative z-10 max-w-2xl">
                        <h1 className="text-5xl md:text-6xl font-black mb-4 italic uppercase tracking-tighter leading-tight whitespace-pre-line">{bannerInfo.title}</h1>
                        <p className="text-blue-100 text-lg mb-8 opacity-90 font-medium max-w-lg whitespace-pre-line">{bannerInfo.subtitle}</p>
                        <div className="flex flex-wrap gap-4">
                          <button onClick={() => setActiveTab('shop')} className="bg-white text-blue-900 px-8 py-3.5 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-yellow-400 transition-colors shadow-lg">Xem Sản Phẩm</button>
                          <button onClick={() => setActiveTab('deposit')} className="bg-blue-600/50 backdrop-blur px-8 py-3.5 rounded-2xl font-black uppercase text-xs tracking-widest border border-white/20 hover:bg-blue-600 transition-colors">Nạp Tiền Vào Ví</button>
                        </div>
                      </div>

                            <div className="flex justify-between items-start mb-1">

                              <div className="space-y-1.5">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tên Tài Khoản Đăng Nhập</label>

                              </div>
                              <button className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-100 uppercase text-xs tracking-widest flex items-center justify-center gap-2 mt-4 hover:bg-blue-700">

                              </button>
                              <p className="text-[10px] text-center text-slate-400 font-bold italic leading-relaxed uppercase pt-2">

                                  <div key={req.id} className="p-5 bg-slate-50 rounded-3xl border flex flex-col sm:flex-row justify-between items-center gap-4">
                                     <div className="flex items-center gap-4 w-full sm:w-auto">
                                        <div className={`p-4 rounded-2xl flex-shrink-0 flex items-center justify-center w-14 h-14 ${req.category === 'deposit' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-blue-600'}`}>

                                           <p className="text-sm font-black text-slate-800 uppercase tracking-tighter">
                                              {req.user} - {req.category === 'deposit' ? `Nạp ${req.method}` : `Mua hàng`}
                                           </p>
                                           <p className="text-sm font-black text-red-600 mt-0.5">
                                              {req.category === 'deposit' && req.method === 'Thẻ cào' ? (

                                                  <span className="line-through text-slate-400 text-xs mr-2">{req.value?.toLocaleString()}đ</span>

                                      </button>
                                   </div>
                                ))}
                              </div>
                           </div>

                                     placeholder="Tìm tên tài khoản cần cộng..."

                                     onBlur={() => setTimeout(() => setShowUserDropdown(false), 200)}

                                     <div className="absolute z-10 w-full mt-2 bg-white border border-slate-100 rounded-xl shadow-xl max-h-48 overflow-y-auto custom-scrollbar">
                                        {registeredUsers.filter(u => u.username.toLowerCase().includes(targetUser.toLowerCase())).length > 0 ? (
                                           registeredUsers.filter(u => u.username.toLowerCase().includes(targetUser.toLowerCase())).map((u, idx) => (
                                              <div

                                                 <span className="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md">{u.balance.toLocaleString()}đ</span>
                                              </div>
                                           ))
                                        ) : (
                                           <div className="p-4 text-center text-[10px] font-black uppercase text-slate-400 tracking-widest">Không tìm thấy tài khoản</div>

                                  placeholder="Số tiền cần cộng (VNĐ)"

                                  XÁC NHẬN CỘNG TIỀN
                                </button>
                              </form>

                                         <div>
                                           <p className="text-xs font-black text-slate-800 flex items-center gap-1.5"><i className="fa-solid fa-user text-[12px]"></i> {u.username}</p>
                                           <p className="text-[10px] font-mono text-slate-500 mt-1.5 bg-white px-2 py-1 rounded border border-slate-100 shadow-sm inline-block">Mật khẩu: <span className="text-red-500 font-bold">{u.password}</span></p>
                                         </div>
                                         <div className="text-right">
                                           <p className="text-sm font-black text-emerald-600">{u.balance.toLocaleString()}đ</p>
                                           <button 
                                             onClick={() => {
                                               setTargetUser(u.username);
                                               window.scrollTo({ top: 0, behavior: 'smooth' });
                                             }}
                                             className="text-[9px] font-black uppercase text-white mt-1.5 bg-blue-500 px-2.5 py-1.5 rounded-lg opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity hover:bg-blue-600"
                                           >
                                             Chọn Cộng
                                           </button>
                                         </div>
                                       </div>
                                     ))
                                   )}
                                 </div>
                              </div>
                           </div>

                           <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border">
                              <h3 className="font-black mb-6 flex items-center gap-2 uppercase text-xs tracking-widest text-slate-400"><i className="fa-solid fa-circle-plus text-[16px]"></i> Đăng sản phẩm</h3>
                              <form onSubmit={(e) => {
                                e.preventDefault();
                                const product = { ...newItem, id: Date.now(), price: parseInt(newItem.price), stock: parseInt(newItem.stock) || 0, img: `https://api.dicebear.com/7.x/shapes/svg?seed=${newItem.name}` };
                                setItems([product, ...items]);
                                setNewItem({ name: '', price: '', stock: '', category: 'Sword', desc: '' });
                                showNotify("Đã đăng vật phẩm thành công!");
                              }} className="space-y-4">
                                <input placeholder="Tên vật phẩm" required value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" />
                                <div className="grid grid-cols-2 gap-2">
                                   <input type="number" placeholder="Giá tiền (VNĐ)" required value={newItem.price} onChange={e => setNewItem({...newItem, price: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" />
                                   <input type="number" placeholder="Số lượng" required value={newItem.stock} onChange={e => setNewItem({...newItem, stock: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" />
                                </div>
                                <select value={newItem.category} onChange={e => setNewItem({...newItem, category: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-slate-700">
                                   <option>Sword</option><option>Melee</option><option>Item</option><option>Gamepass</option>
                                </select>
                                <button className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl shadow-blue-100 hover:bg-blue-700 transition-colors">ĐĂNG TẢI</button>
                              </form>
                           </div>

                           {/* Cài đặt thông báo */}
                           <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border">
                              <h3 className="font-black mb-6 flex items-center gap-2 uppercase text-xs tracking-widest text-slate-400"><i className="fa-solid fa-comment-dots text-[16px]"></i> Cài đặt thông báo Popup</h3>
                              <p className="text-[10px] text-slate-500 font-bold italic mb-4">Nội dung này sẽ hiển thị cho khách ngay sau khi họ bấm thanh toán thành công.</p>
                              <textarea 
                                value={checkoutMessage}
                                onChange={(e) => setCheckoutMessage(e.target.value)}
                                rows={5}
                                className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm text-slate-700 leading-relaxed resize-none focus:ring-2 focus:ring-blue-500"
                              />
                              <button 
                                onClick={() => showNotify("Đã cập nhật câu thông báo thành công!")} 
                                className="w-full py-4 mt-4 bg-slate-900 text-white font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl hover:bg-slate-800 transition-colors"
                              >
                                LƯU THAY ĐỔI
                              </button>
                           </div>

                           {/* Cài đặt Banner */}
                           <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border">
                              <h3 className="font-black mb-6 flex items-center gap-2 uppercase text-xs tracking-widest text-slate-400"><i className="fa-solid fa-pen-to-square text-[16px]"></i> Tùy chỉnh Banner Trang Chủ</h3>
                              <div className="space-y-4">
                                 <div className="space-y-1.5">
                                   <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Tiêu Đề Chính</label>
                                   <textarea
                                     value={bannerInfo.title}
                                     onChange={e => setBannerInfo({...bannerInfo, title: e.target.value})}
                                     rows={2}
                                     className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm text-slate-700 resize-none focus:ring-2 focus:ring-blue-500"
                                   />
                                 </div>
                                 <div className="space-y-1.5">
                                   <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Mô Tả Phụ</label>
                                   <textarea
                                     value={bannerInfo.subtitle}
                                     onChange={e => setBannerInfo({...bannerInfo, subtitle: e.target.value})}
                                     rows={3}
                                     className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm text-slate-700 resize-none focus:ring-2 focus:ring-blue-500"
                                   />
                                 </div>
                                 <button 
                                   onClick={() => showNotify("Đã cập nhật Banner thành công!")} 
                                   className="w-full py-4 mt-2 bg-slate-900 text-white font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl hover:bg-slate-800 transition-colors"
                                 >
                                   LƯU BANNER
                                 </button>
                              </div>
                           </div>

                           {/* Cài đặt Thông tin Ngân Hàng */}
                           <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border">
                              <h3 className="font-black mb-6 flex items-center gap-2 uppercase text-xs tracking-widest text-slate-400"><i className="fa-solid fa-building-columns text-[16px]"></i> Cài đặt Ngân hàng & QR</h3>
                              <div className="space-y-4">
                                 <div className="space-y-1.5">
                                   <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Link Ảnh Mã QR</label>
                                   <input
                                     type="text"
                                     value={bankInfo.qrUrl}
                                     onChange={e => setBankInfo({...bankInfo, qrUrl: e.target.value})}
                                     placeholder="Nhập đường link ảnh đuôi .jpg, .png..."
                                     className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm text-slate-700 focus:ring-2 focus:ring-blue-500"
                                   />
                                   <p className="text-[9px] font-bold text-slate-400 italic">Mẹo: Bạn có thể gửi ảnh mã QR lên tin nhắn Facebook, Messenger hoặc Discord rồi chuột phải, chọn "Copy Image Address" (Sao chép địa chỉ hình ảnh) và dán vào đây.</p>
                                 </div>
                                 <div className="space-y-1.5">
                                   <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Tên Chủ Tài Khoản</label>
                                   <input
                                     type="text"
                                     value={bankInfo.accountName}
                                     onChange={e => setBankInfo({...bankInfo, accountName: e.target.value})}
                                     className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm text-slate-700 focus:ring-2 focus:ring-blue-500"
                                   />
                                 </div>
                                 <div className="space-y-1.5">
                                   <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Số Tài Khoản</label>
                                   <input
                                     type="text"
                                     value={bankInfo.accountNumber}
                                     onChange={e => setBankInfo({...bankInfo, accountNumber: e.target.value})}
                                     className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm text-slate-700 focus:ring-2 focus:ring-blue-500"
                                   />
                                 </div>
                                 <div className="space-y-1.5">
                                   <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Tên Ngân Hàng</label>
                                   <input
                                     type="text"
                                     value={bankInfo.bankName}
                                     onChange={e => setBankInfo({...bankInfo, bankName: e.target.value})}
                                     className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm text-slate-700 focus:ring-2 focus:ring-blue-500"
                                   />
                                 </div>
                                 <button 
                                   onClick={() => showNotify("Đã cập nhật Thông tin Ngân hàng thành công!")} 
                                   className="w-full py-4 mt-2 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl hover:bg-blue-700 transition-colors"
                                 >
                                   LƯU THÔNG TIN
                                 </button>
                              </div>
                           </div>
                        </div>
                     </div>
                  </div>
                )}

                {/* History */}
                {activeTab === 'history' && (
                  <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in duration-500 pb-20">
                     <h2 className="text-2xl font-black uppercase italic border-l-4 border-blue-600 pl-4">Lịch Sử Của Bạn</h2>
                     <div className="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                        <table className="w-full text-left">
                          <thead className="bg-slate-50 text-[9px] font-black text-slate-400 uppercase tracking-widest border-b">
                            <tr>
                              <th className="px-6 py-5">Ngày Giao Dịch</th>
                              <th className="px-6 py-5">Chi Tiết</th>
                              <th className="px-6 py-5">Số Tiền</th>
                              <th className="px-6 py-5 text-center">Trạng Thái</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {transactionHistory.filter(h => h.user === user?.name || user?.role === 'admin').map(h => (
                              <tr key={h.id} className="text-xs hover:bg-slate-50 transition-colors">
                                <td className="px-6 py-5 text-slate-500 font-bold">{h.date}</td>
                                <td className="px-6 py-5">
                                  <p className="font-black text-slate-800 uppercase tracking-tighter">
                                    {h.category === 'deposit' ? `Nạp Tiền: ${h.method}` : `Mua Hàng (${h.items.length} món)`}
                                  </p>
                                  {h.robloxUser && <p className="text-[9px] font-black text-blue-500 uppercase mt-1">ID ROBLOX: {h.robloxUser}</p>}
                                </td>
                                <td className="px-6 py-5 font-black text-red-600 text-sm">{h.category === 'deposit' ? (h.receivedValue || h.value)?.toLocaleString() : h.total?.toLocaleString()}đ</td>
                                <td className="px-6 py-5 text-center">
                                  <span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest ${
                                    h.status === 'pending' ? 'bg-orange-100 text-orange-600' :
                                    h.status === 'approved' || h.status === 'completed' ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'
                                  }`}>
                                    {h.status === 'pending' ? 'Chờ Xử Lý' : h.status === 'approved' ? 'Thành Công' : h.status === 'completed' ? 'Hoàn Tất' : 'Đã Hủy'}
                                  </span>
                                </td>
                              </tr>
                            ))}
                            {transactionHistory.length === 0 && <tr><td colSpan="4" className="py-20 text-center text-slate-400 font-bold italic">Chưa có dữ liệu giao dịch.</td></tr>}
                          </tbody>
                        </table>
                     </div>
                  </div>
                )}
              </main>

              {/* Cart Drawer */}
              {isCartOpen && (
                <div className="fixed inset-0 z-[100] flex justify-end">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onClick={() => setIsCartOpen(false)}></div>
                  <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-in slide-in-from-right duration-300">
                     <div className="p-8 border-b bg-slate-900 text-white flex justify-between items-center">
                        <h2 className="font-black uppercase italic tracking-tighter flex items-center gap-2 text-xl"><i className="fa-solid fa-cart-shopping text-[22px]"></i> Giỏ Hàng</h2>
                        <button onClick={() => setIsCartOpen(false)} className="hover:scale-110 transition-transform bg-white/10 p-2 w-8 h-8 rounded-full flex items-center justify-center"><i className="fa-solid fa-xmark text-[20px]"></i></button>
                     </div>
                     
                     <div className="flex-grow overflow-y-auto p-6 space-y-4">
                        {cart.map(i => (
                          <div key={i.id} className="bg-slate-50 p-4 rounded-3xl border border-slate-100">
                            <div className="flex gap-4 items-start">
                               <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center p-2 shadow-sm border border-slate-50">
                                  <img src={i.img} className="w-full h-full object-contain" />
                               </div>
                               <div className="flex-grow">
                                 <p className="text-[9px] font-black uppercase tracking-widest text-blue-500 mb-1">{i.category}</p>
                                 <p className="text-xs font-black text-slate-800 uppercase italic line-clamp-1">{i.name}</p>
                                 
                                 {/* Tùy chỉnh số lượng trong giỏ */}
                                 <div className="flex items-center justify-between mt-2">
                                   <div className="flex items-center bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
                                      <button onClick={() => updateCartQty(i.id, -1)} className="w-8 h-7 flex items-center justify-center bg-slate-50 hover:bg-slate-100 text-slate-600 transition-colors font-bold">-</button>
                                      <span className="w-8 text-center text-xs font-black text-slate-800">{i.qty}</span>
                                      <button onClick={() => updateCartQty(i.id, 1)} className="w-8 h-7 flex items-center justify-center bg-slate-50 hover:bg-slate-100 text-slate-600 transition-colors font-bold">+</button>
                                   </div>
                                   <p className="text-sm font-black text-red-600">{(i.price * i.qty).toLocaleString()}đ</p>
                                 </div>
                               </div>
                            </div>
                          </div>
                        ))}
                        {cart.length === 0 && (
                          <div className="h-full flex flex-col items-center justify-center space-y-4">
                             <i className="fa-solid fa-cart-shopping text-slate-200 text-[60px]"></i>
                             <p className="text-slate-400 font-bold text-sm">Giỏ hàng đang trống.</p>
                          </div>
                        )}
                     </div>

                     {cart.length > 0 && (
                       <div className="p-8 border-t bg-white shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
                          <div className="bg-blue-50/50 p-5 rounded-3xl border border-blue-100 mb-6">
                            <label className="flex items-center gap-2 text-[10px] font-black text-blue-800 uppercase tracking-widest mb-2"><i className="fa-solid fa-user text-[14px]"></i> ID Roblox Nhận Đồ</label>
                            <input 
                              type="text" 
                              placeholder="Nhập tên đăng nhập Roblox..." 
                              value={robloxUsername} 
                              onChange={e => setRobloxUsername(e.target.value)}
                              className="w-full p-4 bg-white border border-blue-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold shadow-sm"
                            />
                          </div>
                          <div className="flex justify-between items-end mb-6 px-2">
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">TỔNG THANH TOÁN</span>
                            <span className="text-3xl font-black text-red-600 tracking-tighter">{cart.reduce((s, i) => s + i.price * i.qty, 0).toLocaleString()}đ</span>
                          </div>
                          <button 
                            onClick={checkout} 
                            disabled={!user}
                            className="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-200 uppercase text-sm tracking-widest disabled:bg-slate-300 transition-all hover:bg-blue-700 active:scale-[0.98]"
                          >
                            {!user ? 'ĐĂNG NHẬP ĐỂ MUA' : 'XÁC NHẬN THANH TOÁN'}
                          </button>
                       </div>
                     )}
                  </div>
                </div>
              )}

              {/* Footer */}
              <footer className="bg-slate-900 text-white mt-10 pt-16 pb-8 px-4 border-t-4 border-blue-600">
                <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12 border-b border-white/10 pb-12">
                  <div className="space-y-6">
                    <div className="flex items-center gap-2">
                      <div className="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-500/20 w-11 h-11 flex items-center justify-center"><i className="fa-solid fa-anchor text-[24px]"></i></div>
                      <span className="text-3xl font-black uppercase italic tracking-tighter leading-none">Sailor<span className="text-blue-500">Shop</span></span>
                    </div>
                    <p className="text-slate-400 text-sm leading-relaxed font-medium">Đối tác cung cấp vật phẩm uy tín hàng đầu. Cam kết bảo mật, giao hàng trực tiếp nhanh chóng.</p>
                  </div>
                  
                  <div className="space-y-6">
                    <h4 className="font-black uppercase italic text-blue-500 tracking-widest text-sm">Hỗ Trợ Khách Hàng</h4>
                    <div className="space-y-4">
                       <a href={FANPAGE_URL} target="_blank" rel="noreferrer" className="flex items-center gap-4 group cursor-pointer bg-white/5 p-3 rounded-2xl hover:bg-white/10 transition-colors">
                          <div className="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-lg"><i className="fa-brands fa-facebook-messenger text-[22px]"></i></div>
                          <div>
                            <p className="text-xs font-black uppercase text-slate-100">Chat Với Fanpage</p>
                            <p className="text-[10px] text-blue-400 font-bold uppercase tracking-widest mt-0.5">Hỗ trợ từ 18:00 - 23:00</p>
                          </div>
                       </a>
                    </div>
                  </div>

                  <div className="space-y-6">
                    <h4 className="font-black uppercase italic text-blue-500 tracking-widest text-sm">Liên Kết Nhanh</h4>
                    <div className="grid grid-cols-2 gap-y-4 gap-x-2 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                       <span className="hover:text-blue-400 transition-colors cursor-pointer" onClick={() => setActiveTab('home')}>Trang chủ</span>
                       <span className="hover:text-blue-400 transition-colors cursor-pointer" onClick={() => setActiveTab('shop')}>Sản phẩm</span>
                       <span className="hover:text-blue-400 transition-colors cursor-pointer" onClick={() => setActiveTab('deposit')}>Nạp tiền</span>
                       <span className="hover:text-blue-400 transition-colors cursor-pointer" onClick={() => setActiveTab('history')}>Lịch sử</span>
                    </div>
                  </div>
                </div>
                <p className="text-center text-[10px] font-black text-slate-600 uppercase tracking-widest mt-8 italic">
                  © 2024 Sailor Piece Market. All Rights Reserved. Designed by Yewan.
                </p>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
